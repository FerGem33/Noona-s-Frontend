<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#5d1927",
                    "background-light": "#febdc6",
                    "background-dark": "#1f1316",
                },
                fontFamily: { "display": ["Plus Jakarta Sans"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<title>Nonna - GESTIÓN DE ROLES</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-primary/10 px-10 py-4 bg-white/30 backdrop-blur-sm">
    <div class="flex items-center gap-6">
        <div class="flex items-center gap-3">
            <div class="size-10 bg-primary rounded-lg flex items-center justify-center text-white">
                <span class="material-symbols-outlined text-3xl text-white">cookie</span>
            </div>
            <h2 class="text-primary text-2xl font-extrabold leading-tight tracking-[-0.015em]">Nonna</h2>
        </div>
        <div class="h-8 w-[1px] bg-primary/20"></div>
        <a class="flex items-center gap-2 text-primary hover:bg-primary/10 px-4 py-2 rounded-lg transition-colors duration-200" href="index.html">
            <span class="material-symbols-outlined">arrow_back</span>
            <span class="text-sm font-bold leading-normal">Regresar a CRUDs</span>
        </a>
    </div>
</header>
<main class="flex flex-1 justify-center py-12 px-10">
    <div class="layout-content-container flex flex-col max-w-[1000px] flex-1">
        <div class="flex flex-col gap-6 mb-8">
            <h1 class="text-primary text-5xl font-black leading-tight tracking-[-0.033em] text-center">GESTIÓN DE ROLES</h1>
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex-1 min-w-[300px] relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/50">search</span>
                    <input id="buscador" class="w-full pl-12 pr-4 py-3 rounded-xl border-none ring-1 ring-primary/10 focus:ring-2 focus:ring-primary bg-white shadow-sm transition-all outline-none" placeholder="Buscar roles...">
                </div>
                <a href="rol_nuevo.html" class="flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-xl font-bold shadow-lg hover:shadow-xl hover:bg-primary/90 transition-all active:scale-95">
                    <span class="material-symbols-outlined">add_circle</span>
                    <span>Nuevo Rol</span>
                </a>
            </div>
        </div>
        <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-white">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-primary/5 border-b border-primary/10">
                            <th class="px-10 py-5 text-primary font-extrabold uppercase tracking-wider text-sm">Descripción</th>
                            <th class="px-10 py-5 text-primary font-extrabold uppercase tracking-wider text-sm text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-roles" class="divide-y divide-primary/5">
                        <tr><td colspan="2" class="text-center py-10 text-primary/50">Cargando roles...</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- Sección de paginación eliminada: ya no hay flechas ni números -->
            <div class="px-10 py-6 bg-primary/5 flex items-center justify-between border-t border-primary/10">
                <p id="total-registros" class="text-primary/60 text-sm font-medium">Cargando...</p>
                <!-- Los botones de paginación han sido removidos -->
            </div>
        </div>
    </div>
</main>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    async function listarRoles() {
        const res = await fetch(`${API_BASE}/rol/`, { headers: getHeaders() });
        if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
        return res.json();
    }

    async function eliminarRol(id) {
        const res = await fetch(`${API_BASE}/rol/${id}`, { method: 'DELETE', headers: getHeaders() });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Error al eliminar');
        }
        return res.json();
    }

    let todosRoles = [];

    function renderizarTabla(roles) {
        const tbody = document.getElementById('tabla-roles');
        if (!roles.length) {
            tbody.innerHTML = `<tr><td colspan="2" class="text-center py-10 text-primary/50">No hay roles. ¡Crea el primero!</td></tr>`;
            document.getElementById('total-registros').innerText = 'Mostrando 0 roles';
            return;
        }
        tbody.innerHTML = '';
        roles.forEach(rol => {
            const fila = `
                <tr class="hover:bg-primary/[0.02] transition-colors group">
                    <td class="px-10 py-6">
                        <div class="flex flex-col">
                            <span class="font-bold text-slate-800 text-lg">${escapeHtml(rol.descripcion)}</span>
                            <div class="flex items-center gap-1.5 text-slate-500 text-sm mt-1">
                                <span class="material-symbols-outlined text-base">info</span>
                                <span>ID: ${rol.id_rol}</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-10 py-6">
                        <div class="flex items-center justify-end gap-3">
                            <a href="rol_editar.html?id=${rol.id_rol}" class="p-2.5 text-primary hover:bg-primary/10 rounded-xl transition-colors" title="Editar">
                                <span class="material-symbols-outlined">edit</span>
                            </a>
                            <a href="rol_eliminar.html?id=${rol.id_rol}" class="p-2.5 text-primary hover:bg-primary/10 rounded-xl transition-colors" title="Eliminar">
                                <span class="material-symbols-outlined">delete</span>
                            </a>
                        </div>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', fila);
        });
        document.getElementById('total-registros').innerText = `Mostrando ${roles.length} de ${todosRoles.length} roles`;
    }

    async function cargarRoles() {
        const tbody = document.getElementById('tabla-roles');
        tbody.innerHTML = `<tr><td colspan="2" class="text-center py-10 text-primary/50">Cargando...</td></tr>`;
        try {
            todosRoles = await listarRoles();
            renderizarTabla(todosRoles);
        } catch (error) {
            console.error(error);
            let mensaje = error.message;
            if (mensaje.includes('401') || mensaje.includes('Token')) mensaje = 'Token inválido o expirado. Actualiza TOKEN.';
            else if (mensaje.includes('Failed to fetch')) mensaje = 'Error de CORS o conexión. Usa Live Server.';
            tbody.innerHTML = `<tr><td colspan="2" class="text-center py-10 text-red-500">Error: ${mensaje}</td></tr>`;
        }
    }

    const buscador = document.getElementById('buscador');
    if (buscador) {
        buscador.addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase();
            if (!texto.trim()) return renderizarTabla(todosRoles);
            const filtrados = todosRoles.filter(r => r.descripcion?.toLowerCase().includes(texto));
            renderizarTabla(filtrados);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    cargarRoles();
</script>
</body>
</html>
