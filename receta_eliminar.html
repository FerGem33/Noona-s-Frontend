<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#5d1927",
                    "accent": "#febdc6",
                    "background-light": "#f8f6f6",
                    "background-dark": "#1f1316",
                },
                fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .modal-mensaje {
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }
</style>
</head>
<body class="bg-accent min-h-screen flex items-center justify-center p-4">
<div class="fixed inset-0 bg-primary/20 backdrop-blur-sm flex items-center justify-center p-6">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-[560px] overflow-hidden flex flex-col items-center p-8 md:p-12 text-center">
        <div class="mb-10">
            <h2 class="text-primary text-2xl md:text-3xl font-bold leading-tight mb-4">¿Seguro que deseas eliminar esta receta?</h2>
            <p id="mensaje-receta" class="text-primary/70 text-lg leading-relaxed max-w-sm mx-auto">Cargando...</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
            <a href="recetas.html" class="flex-1 min-w-[160px] h-14 px-6 rounded-lg border-2 border-primary/20 bg-white text-primary font-bold text-lg hover:bg-primary/5 transition-colors flex items-center justify-center">Cancelar</a>
            <button id="btn-eliminar" class="flex-1 min-w-[160px] h-14 px-6 rounded-lg bg-primary text-white font-bold text-lg hover:opacity-90 transition-opacity flex items-center justify-center">Eliminar</button>
        </div>
        <div class="mt-8 pt-8 border-t border-primary/5 w-full">
            <div class="flex justify-center gap-2 opacity-20">
                <span class="material-symbols-outlined text-primary"></span>
                <span class="material-symbols-outlined text-primary"></span>
                <span class="material-symbols-outlined text-primary"></span>
            </div>
        </div>
    </div>
</div>

<!-- MODAL DE CONFIRMACIÓN (antes de eliminar) -->
<div id="modal-confirmacion" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
        <div class="mx-auto mb-4">
            <span class="material-symbols-outlined text-amber-600 text-5xl"></span>
        </div>
        <h3 class="text-xl font-bold text-slate-900">Confirmar eliminación</h3>
        <p class="text-slate-500 mt-2">¿Estás seguro de que deseas eliminar esta receta?<br>Esta acción no se puede deshacer.</p>
        <div class="flex gap-3 mt-6">
            <button id="btn-confirmar-eliminar" class="flex-1 bg-red-600 text-white font-bold py-2 px-4 rounded-xl hover:bg-red-700 transition-colors">Sí, eliminar</button>
            <button id="btn-cancelar-confirmacion" class="flex-1 bg-gray-200 text-gray-800 font-bold py-2 px-4 rounded-xl hover:bg-gray-300 transition-colors">Cancelar</button>
        </div>
    </div>
</div>

<!-- MODAL DE ÉXITO -->
<div id="modal-exito" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
        <div class="mx-auto mb-4">
            <span class="material-symbols-outlined text-green-600 text-5xl">check_circle</span>
        </div>
        <h3 class="text-xl font-bold text-slate-900">¡Receta eliminada!</h3>
        <p class="text-slate-500 mt-2">La receta se ha eliminado correctamente.</p>
        <button id="btn-cerrar-exito" class="mt-6 w-full bg-primary text-white font-bold py-2 px-4 rounded-xl hover:bg-primary/90 transition-colors">
            Continuar
        </button>
    </div>
</div>

<!-- MODAL DE ERROR DE CONEXIÓN / API -->
<div id="modal-error" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
        <div class="mx-auto mb-4">
            <span class="material-symbols-outlined text-red-600 text-5xl"></span>
        </div>
        <h3 class="text-xl font-bold text-slate-900">Error</h3>
        <p class="text-slate-500 mt-2" id="error-mensaje"></p>
        <button id="btn-cerrar-error" class="mt-6 w-full bg-primary text-white font-bold py-2 px-4 rounded-xl hover:bg-primary/90 transition-colors">
            Cerrar
        </button>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    const urlParams = new URLSearchParams(window.location.search);
    const recetaId = urlParams.get('id');
    if (!recetaId) {
        mostrarError('No se especificó qué receta eliminar', true);
    }

    let recetaActual = null;

    async function obtenerReceta(id) {
        const res = await fetch(`${API_BASE}/receta/recetas/${id}`, { headers: getHeaders() });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
    }

    async function eliminarReceta(id) {
        const res = await fetch(`${API_BASE}/receta/recetas/${id}`, {
            method: 'DELETE',
            headers: getHeaders()
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Error al eliminar');
        }
        return res.json();
    }

    function mostrarError(mensaje, redirigir = false) {
        const modal = document.getElementById('modal-error');
        document.getElementById('error-mensaje').innerText = mensaje;
        modal.classList.remove('hidden');
        const cerrarBtn = document.getElementById('btn-cerrar-error');
        cerrarBtn.onclick = () => {
            modal.classList.add('hidden');
            if (redirigir) window.location.href = 'recetas.html';
        };
    }

    function mostrarConfirmacion() {
        document.getElementById('modal-confirmacion').classList.remove('hidden');
    }

    function ocultarConfirmacion() {
        document.getElementById('modal-confirmacion').classList.add('hidden');
    }

    function mostrarExito() {
        document.getElementById('modal-exito').classList.remove('hidden');
        document.getElementById('btn-cerrar-exito').onclick = () => {
            window.location.href = 'recetas.html';
        };
    }

    async function cargarDatos() {
        try {
            recetaActual = await obtenerReceta(recetaId);
            document.getElementById('mensaje-receta').innerHTML = `Esta acción no se puede deshacer y se borrarán todos los vínculos con ingredientes.<br><strong class="text-primary">“${escapeHtml(recetaActual.descripcion)}”</strong>`;
        } catch (error) {
            console.error(error);
            let mensaje = error.message;
            if (error.message.includes('Failed to fetch')) mensaje = 'No se pudo conectar con el servidor. Verifica tu conexión o token.';
            else if (error.message.includes('401')) mensaje = 'Token inválido o expirado. Inicia sesión nuevamente.';
            mostrarError(mensaje, true);
        }
    }

    async function eliminarRecetaHandler() {
        ocultarConfirmacion();
        try {
            await eliminarReceta(recetaId);
            mostrarExito();
        } catch (error) {
            let mensaje = error.message;
            if (error.message.includes('Failed to fetch')) mensaje = 'No se pudo conectar con el servidor. Verifica tu conexión.';
            else if (error.message.includes('401')) mensaje = 'Token inválido o expirado. Inicia sesión nuevamente.';
            mostrarError(mensaje);
        }
    }

    // Eventos
    document.getElementById('btn-eliminar').addEventListener('click', mostrarConfirmacion);
    document.getElementById('btn-confirmar-eliminar').addEventListener('click', eliminarRecetaHandler);
    document.getElementById('btn-cancelar-confirmacion').addEventListener('click', ocultarConfirmacion);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    cargarDatos();
</script>
</body>
</html>
