<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#5d1927",
                    "accent": "#febdc6",
                    "background-light": "#f8f6f6",
                    "background-dark": "#1f1316",
                },
                fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="bg-accent min-h-screen flex items-center justify-center p-4">
<div class="fixed inset-0 bg-primary/20 backdrop-blur-sm flex items-center justify-center p-6">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-[560px] overflow-hidden flex flex-col items-center p-8 md:p-12 text-center">
        <div class="mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-primary/10">
            <span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48"></span>
        </div>
        <div class="mb-10">
            <h2 class="text-primary text-2xl md:text-3xl font-bold leading-tight mb-4">¿Seguro que deseas eliminar esta receta?</h2>
            <p id="mensaje-receta" class="text-primary/70 text-lg leading-relaxed max-w-sm mx-auto">Cargando...</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center">
            <a href="recetas.html" class="flex-1 min-w-[160px] h-14 px-6 rounded-lg border-2 border-primary/20 bg-white text-primary font-bold text-lg hover:bg-primary/5 transition-colors flex items-center justify-center">Cancelar</a>
            <button id="btn-eliminar" class="flex-1 min-w-[160px] h-14 px-6 rounded-lg bg-primary text-white font-bold text-lg hover:opacity-90 transition-opacity flex items-center justify-center">Eliminar</button>
        </div>
        <div class="mt-8 pt-8 border-t border-primary/5 w-full">
            <div class="flex justify-center gap-2 opacity-20">
                <span class="material-symbols-outlined text-primary"></span>
                <span class="material-symbols-outlined text-primary"></span>
                <span class="material-symbols-outlined text-primary"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    const urlParams = new URLSearchParams(window.location.search);
    const recetaId = urlParams.get('id');
    if (!recetaId) {
        alert('No se especificó qué receta eliminar');
        window.location.href = 'recetas.html';
    }

    async function obtenerReceta(id) {
        const res = await fetch(`${API_BASE}/receta/recetas/${id}`, { headers: getHeaders() });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
    }

    async function eliminarReceta(id) {
        const res = await fetch(`${API_BASE}/receta/recetas/${id}`, {
            method: 'DELETE',
            headers: getHeaders()
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Error al eliminar');
        }
        return res.json();
    }

    async function cargarDatos() {
        try {
            const receta = await obtenerReceta(recetaId);
            document.getElementById('mensaje-receta').innerHTML = `Esta acción no se puede deshacer y se borrarán todos los vínculos con ingredientes.<br><strong class="text-primary">“${escapeHtml(receta.descripcion)}”</strong>`;
        } catch (error) {
            document.getElementById('mensaje-receta').innerHTML = 'Error al cargar la receta';
        }
    }

    document.getElementById('btn-eliminar').addEventListener('click', async () => {
        if (confirm('¿Estás absolutamente seguro? Esta acción es irreversible.')) {
            try {
                await eliminarReceta(recetaId);
                alert('Receta eliminada correctamente');
                window.location.href = 'recetas.html';
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    cargarDatos();
</script>
</body>
</html>
