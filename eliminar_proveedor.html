<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Nonna - Confirmar Eliminación de Proveedor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#5d1927",
                    "background-light": "#f1f5f9",
                    "background-dark": "#0f172a",
                },
                fontFamily: {
                    display: ["Inter", "sans-serif"],
                    sans: ["Inter", "sans-serif"],
                },
                borderRadius: { DEFAULT: "0.5rem" },
            },
        },
    };
</script>
<style>
    body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-xl shadow-2xl border-t-8 border-primary overflow-hidden transform transition-all">
        <div class="p-6">
            <div class="flex items-center gap-4 mb-6">
                <div class="flex-shrink-0 w-12 h-12 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center text-primary">
                    <span class="material-icons-outlined text-3xl">report_problem</span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white leading-tight uppercase tracking-tight">
                        Confirmar Eliminación
                    </h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">MÓDULO DE PROVEEDORES</p>
                </div>
            </div>
            <div class="mb-6">
                <p class="text-slate-600 dark:text-slate-300 leading-relaxed">
                    ¿Estás seguro de que deseas eliminar este proveedor? <span class="font-semibold text-slate-800 dark:text-slate-100">Esta acción no se puede deshacer</span> y afectará los registros históricos asociados.
                </p>
            </div>
            <div class="bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg p-4 mb-8">
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <span class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Razón Social</span>
                        <span id="nombre-proveedor" class="text-base font-semibold text-slate-700 dark:text-slate-200">Cargando...</span>
                    </div>
                </div>
            </div>
            <div class="flex flex-col sm:flex-row-reverse gap-3">
                <button id="btn-eliminar" class="w-full sm:w-auto px-6 py-2.5 bg-primary hover:bg-rose-900 text-white font-semibold rounded-lg shadow-sm transition-all duration-200 active:scale-95 flex items-center justify-center gap-2">
                    <span class="material-icons-outlined text-lg">delete_forever</span>
                    Sí, Eliminar
                </button>
                <a href="proveedores.html" class="w-full sm:w-auto px-6 py-2.5 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-semibold rounded-lg transition-all duration-200 text-center">
                    No, Cancelar
                </a>
            </div>
        </div>
        <div class="bg-slate-50 dark:bg-slate-800/30 px-6 py-3 border-t border-slate-100 dark:border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-1.5 opacity-50">
                <div class="w-2 h-2 rounded-full bg-slate-400"></div>
                <span class="text-[10px] text-slate-500 dark:text-slate-400 font-medium uppercase tracking-tighter">Nonna System v2.4</span>
            </div>
            <button class="text-slate-400 hover:text-slate-600 dark:text-slate-500 dark:hover:text-slate-300" onclick="document.documentElement.classList.toggle('dark')">
                <span class="material-icons-outlined text-sm">dark_mode</span>
            </button>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    const urlParams = new URLSearchParams(window.location.search);
    const proveedorId = urlParams.get('id');
    if (!proveedorId) {
        alert('No se especificó qué proveedor eliminar.');
        window.location.href = 'proveedores.html';
    }

    // Cargar nombre del proveedor para mostrarlo
    async function cargarNombre() {
        try {
            const res = await fetch(`${API_BASE}/proveedor/${proveedorId}`, { headers: getHeaders() });
            if (!res.ok) throw new Error(`Error ${res.status}`);
            const proveedor = await res.json();
            document.getElementById('nombre-proveedor').innerText = proveedor.descripcion || 'Proveedor sin nombre';
        } catch (error) {
            console.error(error);
            document.getElementById('nombre-proveedor').innerText = 'Error al cargar datos';
        }
    }

    // Eliminar proveedor
    async function eliminarProveedor() {
        try {
            const res = await fetch(`${API_BASE}/proveedor/${proveedorId}`, {
                method: 'DELETE',
                headers: getHeaders()
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Error al eliminar');
            }
            alert('Proveedor eliminado correctamente');
            window.location.href = 'proveedores.html';
        } catch (error) {
            alert('Error al eliminar: ' + error.message);
        }
    }

    document.getElementById('btn-eliminar').addEventListener('click', () => {
        if (confirm('¿Estás absolutamente seguro? Esta acción es irreversible.')) {
            eliminarProveedor();
        }
    });

    cargarNombre();
</script>
</body>
</html>
