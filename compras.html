<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Compras - Nonna</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#5d1927", "brand-pink": "#FEBDC6", "background-light": "#f8f6f6", "background-dark": "#1f1316" },
                    fontFamily: { "display": ["Montserrat", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body { background-color: #FEBDC6; font-family: 'Montserrat', sans-serif; }
        .toast-notification {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            min-width: 280px; background: white; border-radius: 0.75rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            padding: 1rem; display: flex; align-items: center; gap: 0.75rem;
            transform: translateX(400px); transition: transform 0.3s ease-out;
            border-left: 4px solid;
        }
        .toast-notification.show { transform: translateX(0); }
        .toast-notification.success { border-left-color: #10b981; }
        .toast-notification.error { border-left-color: #ef4444; }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-7xl mx-auto">
        <!-- Header con botón regreso -->
        <div class="flex justify-between items-center mb-6">
            <a href="index.html" class="flex items-center gap-2 text-primary font-semibold hover:opacity-80">
                <span class="material-symbols-outlined">arrow_back</span>
                <span>CRUD's del Sistema</span>
            </a>
            <div class="flex items-center gap-3 text-primary">
                <div class="bg-primary p-2 rounded-lg text-white">
                    <span class="material-symbols-outlined">shopping_cart</span>
                </div>
                <span class="text-2xl font-bold">Nonna</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-6 border-b border-primary/10 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-extrabold text-primary">Gestión de Compras</h1>
                    <p class="text-slate-500">Registro de compras a proveedores y actualización automática de inventario</p>
                </div>
                <a href="compra_nuevo.html" class="bg-primary text-white px-5 py-2.5 rounded-lg font-bold flex items-center gap-2 hover:bg-primary/90">
                    <span class="material-symbols-outlined">add_circle</span>
                    Nueva Compra
                </a>
            </div>
            <div class="p-6 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-primary/80 text-sm font-bold border-b border-primary/10">
                            <th class="pb-3">ID</th>
                            <th class="pb-3">Proveedor</th>
                            <th class="pb-3">Fecha</th>
                            <th class="pb-3">Total</th>
                            <th class="pb-3 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-compras" class="divide-y divide-primary/5">
                        <tr><td colspan="5" class="text-center py-8 text-slate-400">Cargando compras...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://3.15.13.161:8000/api';
        const TOKEN = localStorage.token;
        if (!TOKEN) {
            alert('No hay sesión activa.');
            window.location.href = 'index.html';
        }

        function getHeaders() {
            return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
        }

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container') || (() => {
                const div = document.createElement('div');
                div.id = 'toast-container';
                div.style.cssText = 'position:fixed; top:20px; right:20px; z-index:1000; display:flex; flex-direction:column; gap:10px;';
                document.body.appendChild(div);
                return div;
            })();
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            const icon = type === 'success' ? 'check_circle' : 'error';
            const color = type === 'success' ? '#10b981' : '#ef4444';
            toast.innerHTML = `<div><span class="material-symbols-outlined" style="color:${color}">${icon}</span></div><div class="flex-1">${msg}</div><div class="toast-close cursor-pointer"><span class="material-symbols-outlined">close</span></div>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            toast.querySelector('.toast-close').onclick = () => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            };
            setTimeout(() => {
                if (toast.parentNode) {
                    toast.classList.remove('show');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 4000);
        }

        let proveedoresMap = {};

        async function cargarProveedores() {
            try {
                const res = await fetch(`${API_BASE}/proveedor/`, { headers: getHeaders() });
                if (res.ok) {
                    const proveedores = await res.json();
                    proveedoresMap = {};
                    proveedores.forEach(p => proveedoresMap[p.id_proveedor] = p.descripcion || `Proveedor ${p.id_proveedor}`);
                }
            } catch(e) { console.error(e); }
        }

        async function listarCompras() {
            const res = await fetch(`${API_BASE}/compra/`, { headers: getHeaders() });
            if (!res.ok) throw new Error(`Error ${res.status}`);
            return res.json();
        }

        async function cargarYRenderizar() {
            const tbody = document.getElementById('tabla-compras');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-400">Cargando...</td></tr>';
            try {
                await cargarProveedores();
                const compras = await listarCompras();
                if (compras.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-slate-400">No hay compras registradas. Crea la primera.</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                compras.forEach(comp => {
                    const proveedor = proveedoresMap[comp.id_proveedor] || `ID ${comp.id_proveedor}`;
                    const fecha = new Date(comp.fecha).toLocaleDateString('es-ES');
                    const fila = `
                        <tr class="hover:bg-primary/5">
                            <td class="py-3">${comp.id_compra}</td>
                            <td class="py-3">${escapeHtml(proveedor)}</td>
                            <td class="py-3">${fecha}</td>
                            <td class="py-3 font-bold">$${comp.total.toFixed(2)}</td>
                            <td class="py-3 text-right">
                                <div class="flex justify-end gap-2">
                                    <a href="compra_editar.html?id=${comp.id_compra}" class="text-primary hover:bg-primary/10 p-1 rounded" title="Editar">
                                        <span class="material-symbols-outlined">edit</span>
                                    </a>
                                    <a href="compra_eliminar.html?id=${comp.id_compra}" class="text-red-600 hover:bg-red-50 p-1 rounded" title="Eliminar">
                                        <span class="material-symbols-outlined">delete</span>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', fila);
                });
            } catch (error) {
                console.error(error);
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-red-500">Error al cargar: ${error.message}</td></tr>`;
                showToast('Error al cargar compras', 'error');
            }
        }

        function escapeHtml(str) { return str ? str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')) : ''; }

        cargarYRenderizar();
    </script>
</body>
</html>
