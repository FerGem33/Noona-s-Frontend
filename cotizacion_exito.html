<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#ec5b13", "background-light": "#f8f6f6", "background-dark": "#221610", "custom-pink": "#FEBDC6" },
                fontFamily: { "display": ["Public Sans"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<title>Nonna - Cotización Exitosa</title>
</head>
<body class="bg-custom-pink font-display antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">
    <div class="layout-container flex h-full grow flex-col">
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 md:px-40 py-4 bg-white/30 backdrop-blur-md">
            <div class="flex items-center gap-4 text-slate-900">
                <div class="flex items-center justify-center size-10 bg-primary rounded-xl text-white"><span class="material-symbols-outlined text-2xl">restaurant</span></div>
                <h2 class="text-slate-900 text-xl font-bold tracking-tight">Nonna</h2>
            </div>
            <a href="cotizaciones.html" class="flex items-center justify-center rounded-xl h-10 w-10 bg-white/50 text-slate-900 hover:bg-white/80"><span class="material-symbols-outlined">close</span></a>
        </header>
        <main class="flex-1 flex items-center justify-center p-4">
            <div class="layout-content-container flex flex-col max-w-[640px] w-full bg-white rounded-xl shadow-xl overflow-hidden">
                <div class="flex w-full bg-primary/10 p-12 flex-col items-center justify-center gap-6">
                    <div class="size-24 rounded-full bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/30"><span class="material-symbols-outlined text-6xl">check_circle</span></div>
                    <div class="w-full max-w-sm h-48 bg-center bg-no-repeat bg-cover rounded-xl shadow-inner border-4 border-white" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBHsiSc9lV6Up56hvwR9VzH0NeMeV0COkvSI9NPb3mTDZfX21PGQfIXNMnwGAyga8CgUcprY_Iyf9tRuzE-uH0G6W-2N5LIJPn8C4_-GpdhTeUEyPHoBgI19-pVYWpHTqriEVt5ZxhYK7e9y_twdftoxc_JxyUOkIbb9vVg1tb3yojcq7vZig81r_A9_zczRrFEVgpkSwWfirillS4rIG7nEMQ9RVg__zHfDsSbDCP2rmohLgF7lzazaRuUfdY-uHKdEyyMeXi6EeE");'></div>
                </div>
                <div class="px-8 pb-10 pt-8 text-center">
                    <h1 class="text-slate-900 text-[32px] font-bold leading-tight pb-3">¡Cotización Generada con Éxito!</h1>
                    <p class="text-slate-600 text-lg pb-8">Tu presupuesto personalizado de Nonna ha sido procesado correctamente y ya está disponible.</p>
                    <div class="flex flex-col gap-4 max-w-md mx-auto">
                        <a href="cotizacion_previa.html?id=${cotizacionId}" class="flex items-center justify-center gap-3 rounded-xl h-14 px-5 bg-primary text-white text-lg font-bold w-full hover:bg-primary/90">Ver Detalles</a>
                        <a href="cotizaciones.html" class="flex items-center justify-center gap-3 rounded-xl h-14 px-5 bg-slate-100 text-slate-700 text-lg font-bold w-full hover:bg-slate-200">Volver al Listado</a>
                    </div>
                </div>
                <div class="bg-slate-50 border-t border-slate-100 px-8 py-4 flex items-center justify-between text-slate-400 text-sm">
                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-sm">info</span><span id="id-cotizacion">ID: Cargando...</span></div>
                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-sm">event</span><span>Válido por 30 días</span></div>
                </div>
            </div>
        </main>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const cotizacionId = urlParams.get('id');
    if (cotizacionId) {
        document.getElementById('id-cotizacion').innerText = `ID: COT-${cotizacionId}`;
        // Actualizar enlace de vista previa
        const prevLink = document.querySelector('a[href*="cotizacion_previa.html"]');
        if (prevLink) prevLink.href = `cotizacion_previa.html?id=${cotizacionId}`;
    }
</script>
</body>
</html>
