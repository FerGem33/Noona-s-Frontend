<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#5d1926", "accent-pink": "#FEBDC6", "background-light": "#f8f6f6", "background-dark": "#1f1315" },
                fontFamily: { "display": ["Plus Jakarta Sans"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<title>Eliminar Usuario - Nonna DB</title>
</head>
<body class="bg-accent-pink font-display min-h-screen">
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background-dark/80 backdrop-blur-[2px]">
    <div class="relative w-full max-w-md transform overflow-hidden rounded-xl bg-white p-8 shadow-2xl transition-all dark:bg-slate-900 border-t-4 border-primary">
        <div class="flex flex-col items-center text-center">
            <div class="mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-primary/10 text-primary">
                <span class="material-symbols-outlined text-[48px] font-light">warning</span>
            </div>
            <h2 class="mb-2 text-2xl font-extrabold text-slate-900 dark:text-slate-100">¿Eliminar este usuario?</h2>
            <p class="mb-8 text-slate-500 dark:text-slate-400 leading-relaxed">
                Estás a punto de eliminar permanentemente el usuario:
            </p>
            <div class="mb-8 w-full rounded-lg bg-slate-50 p-4 text-left border border-slate-100 dark:bg-slate-800 dark:border-slate-700">
                <div class="flex flex-col gap-1">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Nombre de Usuario</span>
                    <span id="nombre-usuario" class="text-lg font-bold text-primary">Cargando...</span>
                </div>
                <div class="mt-3 flex flex-col gap-1">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Rol</span>
                    <span id="rol-usuario" class="text-base text-slate-700 dark:text-slate-300">Cargando...</span>
                </div>
            </div>
            <div class="flex w-full flex-col gap-3 sm:flex-row">
                <button id="btn-eliminar" class="flex flex-1 items-center justify-center rounded-lg bg-primary px-4 py-3 text-base font-bold text-white transition-colors hover:bg-primary/90">
                    Sí, Eliminar
                </button>
                <a href="usuarios.html" class="flex flex-1 items-center justify-center rounded-lg border border-slate-200 bg-white px-4 py-3 text-base font-bold text-slate-700 transition-colors hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
                    No, Mantener
                </a>
            </div>
            <p class="mt-6 text-xs text-slate-400 dark:text-slate-500">
                Esta acción no se puede deshacer y borrará todo el historial relacionado.
            </p>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    const urlParams = new URLSearchParams(window.location.search);
    const usuarioNombre = urlParams.get('nombre');
    if (!usuarioNombre) {
        alert('No se especificó qué usuario eliminar.');
        window.location.href = 'usuarios.html';
    }

    async function cargarUsuario() {
        try {
            const res = await fetch(`${API_BASE}/usuario/${usuarioNombre}`, { headers: getHeaders() });
            if (!res.ok) throw new Error(`Error ${res.status}`);
            const usuario = await res.json();
            document.getElementById('nombre-usuario').innerText = usuario.nombre || 'Usuario sin nombre';
            document.getElementById('rol-usuario').innerText = usuario.rol || `ID Rol: ${usuario.id_rol}`;
        } catch (error) {
            console.error(error);
            document.getElementById('nombre-usuario').innerText = 'Error al cargar datos';
            document.getElementById('rol-usuario').innerText = '';
        }
    }

    async function eliminarUsuario() {
        try {
            let res = await fetch(`${API_BASE}/usuario/${usuarioNombre}`, { method: 'DELETE', headers: getHeaders() });
            if (res.status === 404) {
                // Si falla, obtenemos el ID y usamos ese
                const userRes = await fetch(`${API_BASE}/usuario/${usuarioNombre}`, { headers: getHeaders() });
                const user = await userRes.json();
                res = await fetch(`${API_BASE}/usuario/${user.id_usuario}`, { method: 'DELETE', headers: getHeaders() });
            }
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Error al eliminar');
            }
            alert('Usuario eliminado correctamente');
            window.location.href = 'usuarios.html';
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    document.getElementById('btn-eliminar').addEventListener('click', () => {
        if (confirm('¿Estás absolutamente seguro? Esta acción es irreversible.')) {
            eliminarUsuario();
        }
    });

    cargarUsuario();
</script>
</body>
</html>
