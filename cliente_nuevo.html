<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Registro de Clientes - Nonna DB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#5D1927",
                    "background-light": "#FEBDC6",
                    "background-dark": "#121212",
                },
                fontFamily: { display: ["Outfit", "sans-serif"] },
                borderRadius: { DEFAULT: "0.75rem" },
            },
        },
    };
</script>
<style>
    body { font-family: 'Outfit', sans-serif; }
    .cherry-outline { border: 2px solid #5D1927; color: #5D1927; }
    .cherry-outline:hover { background-color: rgba(93, 25, 39, 0.05); }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4 transition-colors duration-300">
<div class="w-full max-w-2xl bg-white dark:bg-zinc-900 shadow-2xl rounded-3xl overflow-hidden">
    <div class="px-8 pt-10 pb-6 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 rounded-full mb-4">
            <span class="material-symbols-outlined text-primary text-3xl">person_add</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white uppercase tracking-wider">Registrar Nuevo Cliente</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm">Complete la información y las direcciones del cliente.</p>
    </div>
    <form id="form-cliente" class="px-8 pb-10 space-y-6">
        <!-- Datos básicos -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 ml-1">Nombre</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">person</span>
                    <input id="nombre" class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-zinc-800 border-gray-200 dark:border-zinc-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-all outline-none" placeholder="Ej. María" required>
                </div>
            </div>
            <div class="space-y-2">
                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 ml-1">Apellido</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">badge</span>
                    <input id="apellido" class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-zinc-800 border-gray-200 dark:border-zinc-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-all outline-none" placeholder="Ej. García" required>
                </div>
            </div>
        </div>
        <div class="space-y-2">
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 ml-1">Teléfono</label>
            <div class="relative">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">phone</span>
                <input id="telefono" class="w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-zinc-800 border-gray-200 dark:border-zinc-700 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary dark:text-white transition-all outline-none" placeholder="Solo números" type="text" required>
            </div>
        </div>

        <!-- Sección de direcciones -->
        <div class="pt-2 border-t border-gray-100 dark:border-zinc-800">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xs font-bold text-gray-400 dark:text-zinc-500 uppercase tracking-[0.2em]">Direcciones</h2>
                <button type="button" id="btn-agregar-direccion" class="text-xs font-bold text-primary flex items-center gap-1 hover:underline">
                    <span class="material-symbols-outlined text-sm">add_circle</span>
                    Agregar dirección
                </button>
            </div>
            <div id="lista-direcciones" class="space-y-3">
                <!-- mostraran las direcciones agregadas temporalmente -->
            </div>
        </div>

        <!-- Botones de acción -->
        <div class="flex flex-col sm:flex-row gap-4 pt-4">
            <button type="submit" class="flex-1 bg-primary text-white font-bold py-3.5 px-6 rounded-xl hover:opacity-90 active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-xl">save</span>
                Guardar Cliente
            </button>
            <a href="clientes.html" class="flex-1 cherry-outline font-bold py-3.5 px-6 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2 dark:border-primary dark:text-primary-light">
                <span class="material-symbols-outlined text-xl">close</span>
                Cancelar
            </a>
        </div>
    </form>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
    }

    // Almacenar direcciones temporalmente (sin enviar aún)
    let direccionesTemp = [];

    function renderizarDirecciones() {
        const container = document.getElementById('lista-direcciones');
        if (direccionesTemp.length === 0) {
            container.innerHTML = '<p class="text-slate-500 text-sm">No hay direcciones agregadas.</p>';
            return;
        }
        container.innerHTML = '';
        direccionesTemp.forEach((dir, idx) => {
            const div = document.createElement('div');
            div.className = 'p-4 bg-gray-50 dark:bg-zinc-800/50 border border-gray-100 dark:border-zinc-800 rounded-xl flex items-center justify-between group';
            div.innerHTML = `
                <div class="flex items-start gap-3">
                    <span class="material-symbols-outlined text-primary mt-0.5">home</span>
                    <div>
                        <p class="text-sm font-bold text-gray-900 dark:text-white">Dirección ${idx+1}</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">${escapeHtml(dir.descripcion)}</p>
                    </div>
                </div>
                <button class="eliminar-direccion text-gray-400 hover:text-red-500 transition-colors" data-index="${idx}">
                    <span class="material-symbols-outlined text-xl">delete</span>
                </button>
            `;
            container.appendChild(div);
        });
        // Asignar eventos eliminar
        document.querySelectorAll('.eliminar-direccion').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                direccionesTemp.splice(idx, 1);
                renderizarDirecciones();
            });
        });
    }

    // Mostrar modal para agregar una nueva dirección
    function mostrarModalAgregarDireccion() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
        modalDiv.innerHTML = `
            <div class="bg-white dark:bg-zinc-800 rounded-2xl p-6 w-full max-w-md">
                <h3 class="text-xl font-bold mb-4">Nueva Dirección</h3>
                <textarea id="nueva-descripcion" class="w-full border rounded-xl p-3" rows="3" placeholder="Calle, número, colonia, ciudad, CP..."></textarea>
                <div class="flex justify-end gap-3 mt-6">
                    <button id="cancelar-modal" class="px-4 py-2 border rounded-xl">Cancelar</button>
                    <button id="confirmar-modal" class="px-4 py-2 bg-primary text-white rounded-xl">Guardar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#cancelar-modal').onclick = () => modalDiv.remove();
        modalDiv.querySelector('#confirmar-modal').onclick = () => {
            const descripcion = modalDiv.querySelector('#nueva-descripcion').value.trim();
            if (!descripcion) {
                alert('La dirección es obligatoria');
                return;
            }
            direccionesTemp.push({ descripcion });
            renderizarDirecciones();
            modalDiv.remove();
        };
    }

    // Crear cliente y luego sus direcciones
    async function crearClienteConDirecciones() {
        const nombre = document.getElementById('nombre').value.trim();
        const apellido = document.getElementById('apellido').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        if (!nombre || !apellido) {
            alert('Nombre y apellido son obligatorios');
            return;
        }
        // Crear cliente
        let nuevoCliente;
        try {
            const resCliente = await fetch(`${API_BASE}/cliente/`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ nombre, apellido, telefono })
            });
            if (!resCliente.ok) throw new Error('Error al crear cliente');
            nuevoCliente = await resCliente.json();
        } catch (error) {
            alert('Error al crear cliente: ' + error.message);
            return;
        }
        // Crear direcciones asociadas
        let errores = [];
        for (const dir of direccionesTemp) {
            try {
                await fetch(`${API_BASE}/direccion/`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ id_cliente: nuevoCliente.id_cliente, descripcion: dir.descripcion })
                });
            } catch (e) {
                errores.push(dir.descripcion);
            }
        }
        if (errores.length > 0) {
            alert(`Cliente creado, pero algunas direcciones no se guardaron: ${errores.join(', ')}`);
        } else {
            alert('Cliente y direcciones creados correctamente');
        }
        window.location.href = 'clientes.html';
    }

    document.getElementById('form-cliente').addEventListener('submit', async (e) => {
        e.preventDefault();
        await crearClienteConDirecciones();
    });
    document.getElementById('btn-agregar-direccion').addEventListener('click', mostrarModalAgregarDireccion);

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
</script>
</body>
</html>
