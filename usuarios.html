<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style type="text/tailwindcss">
    :root { --primary-color: #5d1927; --bg-color: #febdc6; }
</style>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#5d1927", "background-light": "#febdc6", "background-dark": "#1f1316" },
                fontFamily: { "display": ["Plus Jakarta Sans"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<title>Nonna - GESTIÓN DE USUARIOS</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
    <header class="flex items-center justify-between whitespace-nowrap border-b border-primary/10 px-10 py-4 bg-white/30 backdrop-blur-sm">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3">
                <div class="size-10 bg-primary rounded-lg flex items-center justify-center text-white">
                    <span class="material-symbols-outlined text-3xl">cookie</span>
                </div>
                <h2 class="text-primary text-2xl font-extrabold leading-tight tracking-[-0.015em]">Nonna</h2>
            </div>
            <div class="h-8 w-[1px] bg-primary/20"></div>
            <a class="flex items-center gap-2 text-primary hover:bg-primary/10 px-4 py-2 rounded-lg transition-colors duration-200" href="index.html">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="text-sm font-bold leading-normal">Regresar a CRUDs</span>
            </a>
        </div>
    </header>
    <main class="flex flex-1 justify-center py-10 px-10">
        <div class="layout-content-container flex flex-col max-w-[1200px] flex-1">
            <div class="flex flex-col gap-2 mb-8">
                <h1 class="text-primary text-5xl font-black leading-tight tracking-[-0.033em]">GESTIÓN DE USUARIOS</h1>
                <p class="text-primary/70 text-lg font-medium">Administración de acceso y perfiles de usuario del sistema</p>
            </div>
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <div class="relative w-full md:w-96">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/50">search</span>
                    <input id="buscador" class="w-full pl-10 pr-4 py-2 rounded-lg border-none bg-white/70 focus:ring-2 focus:ring-primary/20 text-primary placeholder-primary/40" placeholder="Buscar usuario...">
                </div>
                <a href="usuario_nuevo.html" class="flex items-center gap-2 bg-primary text-white px-6 py-2.5 rounded-lg font-bold hover:opacity-90 transition-all shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined">person_add</span>
                    <span>Nuevo Usuario</span>
                </a>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-primary/5 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-primary/5">
                                <th class="px-6 py-4 text-primary font-bold text-sm uppercase tracking-wider">Nombre</th>
                                <th class="px-6 py-4 text-primary font-bold text-sm uppercase tracking-wider">Rol</th>
                                <th class="px-6 py-4 text-primary font-bold text-sm uppercase tracking-wider text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-usuarios" class="divide-y divide-primary/5">
                            <tr><td colspan="3" class="text-center py-10 text-primary/50">Cargando usuarios...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    async function listarUsuarios() {
        const res = await fetch(`${API_BASE}/usuario/`, { headers: getHeaders() });
        if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
        return res.json();
    }

    async function eliminarUsuario(id) {
        const res = await fetch(`${API_BASE}/usuario/${id}`, { method: 'DELETE', headers: getHeaders() });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Error al eliminar');
        }
        return res.json();
    }

    let todosUsuarios = [];

    function renderizarTabla(usuarios) {
        const tbody = document.getElementById('tabla-usuarios');
        if (!usuarios.length) {
            tbody.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-primary/50">No hay usuarios. ¡Crea el primero!</td></tr>`;
            return;
        }
        tbody.innerHTML = '';
        usuarios.forEach(usr => {
            const fila = `
                <tr class="hover:bg-primary/5 transition-colors">
                    <td class="px-6 py-4 text-primary font-semibold">${escapeHtml(usr.nombre)}</td>
                    <td class="px-6 py-4 text-primary/80 italic">${escapeHtml(usr.rol || `ID: ${usr.id_rol}`)}</td>
                    <td class="px-6 py-4">
                        <div class="flex justify-center gap-3">
                        <a href="usuario_editar.html?nombre=${encodeURIComponent(usr.nombre)}" class="text-primary hover:bg-primary/10 p-2 rounded-lg transition-colors" title="Editar">
                            <span class="material-symbols-outlined">edit</span>
                        </a>
                        <a href="usuario_eliminar.html?nombre=${encodeURIComponent(usr.nombre)}" class="text-primary hover:bg-primary/10 p-2 rounded-lg transition-colors" title="Eliminar">
                            <span class="material-symbols-outlined">delete</span>
                        </a>
                        </div>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', fila);
        });
    }

    async function cargarUsuarios() {
        const tbody = document.getElementById('tabla-usuarios');
        tbody.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-primary/50">Cargando...</td></tr>`;
        try {
            todosUsuarios = await listarUsuarios();
            renderizarTabla(todosUsuarios);
        } catch (error) {
            console.error(error);
            let mensaje = error.message;
            if (mensaje.includes('401') || mensaje.includes('Token')) mensaje = 'Token inválido o expirado. Actualiza TOKEN.';
            else if (mensaje.includes('Failed to fetch')) mensaje = 'Error de CORS o conexión. Usa Live Server.';
            tbody.innerHTML = `<tr><td colspan="3" class="text-center py-10 text-red-500">Error: ${mensaje}</td></tr>`;
        }
    }

    const buscador = document.getElementById('buscador');
    if (buscador) {
        buscador.addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase();
            if (!texto.trim()) return renderizarTabla(todosUsuarios);
            const filtrados = todosUsuarios.filter(u => u.nombre?.toLowerCase().includes(texto));
            renderizarTabla(filtrados);
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    cargarUsuarios();
</script>
</body>
</html>
