<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;family=Montserrat:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: {
                            rose: '#FEBDC6',
                            wine: '#5D1927',
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Public Sans", "sans-serif"],
                        "display": ["Public Sans", "sans-serif"],
                        "body": ["Public Sans", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"],
                        "montserrat": ["Montserrat", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
    </style>
</head>
<body class="bg-brand-rose font-body flex items-center justify-center min-h-screen antialiased">
<main class="w-full max-w-[1280px] h-[960px] flex items-center justify-center p-6 sm:p-12">
<div class="bg-white rounded-3xl shadow-[0_32px_64px_-12px_rgba(93,25,39,0.15)] p-12 md:p-20 flex flex-col items-center text-center max-w-2xl w-full">
<div class="mb-10 relative">
<div class="absolute inset-0 bg-brand-rose opacity-20 scale-150 rounded-full blur-2xl"></div>
<div class="relative bg-white p-6 rounded-full border-4 border-brand-rose flex items-center justify-center">
<span class="material-symbols-outlined text-8xl text-brand-wine" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<div class="space-y-6 mb-12">
<h1 class="text-4xl md:text-5xl font-extrabold text-brand-wine tracking-tight">Producto actualizado correctamente</h1>
<p class="text-zinc-500 text-lg md:text-xl font-medium max-w-md mx-auto">Los cambios se han guardado exitosamente en tu inventario de repostería.</p>
</div>
<div class="w-full max-w-xs pt-4">
<a id="btn-volver" class="group block w-full bg-white border-2 border-brand-wine text-brand-wine font-bold py-5 px-8 rounded-2xl transition-all duration-300 hover:bg-brand-wine hover:text-white active:scale-95 shadow-sm" href="#">
<span class="flex items-center justify-center gap-3">Volver al catálogo
<span class="material-symbols-outlined text-xl transition-transform group-hover:translate-x-1">arrow_forward</span>
</span>
</a>
</div>
<div class="mt-16 opacity-30">
<span class="font-montserrat font-bold text-brand-wine tracking-widest text-xs uppercase">Pastelería Artesanal</span>
</div>
</div>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-white/30 blur-3xl"></div>
<div class="absolute -bottom-[5%] -right-[5%] w-[30%] h-[30%] rounded-full bg-white/20 blur-3xl"></div>
</div>
</main>
<script>
    document.getElementById('btn-volver').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = 'productos.html';
    });
</script>
</body>
</html>
