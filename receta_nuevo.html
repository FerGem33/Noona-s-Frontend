<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#5d1927",
                    "background-light": "#f8f6f6",
                    "background-dark": "#1f1316",
                    "accent-pink": "#FEBDC6",
                },
                fontFamily: { "sans": ["Montserrat", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
            },
        },
    }
</script>
<style> body { font-family: "Montserrat", sans-serif; } </style>
</head>
<body class="bg-[#FEBDC6] min-h-screen flex items-center justify-center p-4">
<div class="bg-white w-full max-w-[1280px] h-full max-h-[960px] rounded-2xl shadow-2xl overflow-hidden flex flex-col">
    <header class="flex items-center justify-between border-b border-slate-100 px-10 py-6 bg-white">
        <div class="flex items-center gap-4">
            <div class="bg-primary/10 p-3 rounded-xl text-primary">
                <span class="material-symbols-outlined text-3xl">skillet</span>
            </div>
            <div>
                <h1 class="text-slate-900 text-2xl font-extrabold tracking-tight">Agregar Nueva Receta</h1>
                <p class="text-slate-500 text-sm">Gestiona los ingredientes y detalles de la nueva producción de Nonna.</p>
            </div>
        </div>
        <a href="recetas.html" class="text-slate-400 hover:text-slate-600 transition-colors">
            <span class="material-symbols-outlined">close</span>
        </a>
    </header>
    <main class="flex-1 overflow-y-auto p-10 bg-slate-50/50">
        <div class="max-w-4xl mx-auto space-y-8">
            <!-- Información Básica -->
            <section class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm">
                <div class="flex items-center gap-3 mb-6">
                    <span class="material-symbols-outlined text-primary">info</span>
                    <h2 class="text-lg font-bold text-slate-900">Información Básica</h2>
                </div>
                <div class="grid grid-cols-1 gap-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-bold text-slate-700">Descripción de la Receta *</label>
                        <input id="descripcion" class="w-full rounded-xl border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Ej. Pastel de Chocolate Selva Negra Premium" type="text">
                    </div>
                </div>
            </section>
            <!-- Ingredientes (Materias Primas) -->
            <section class="bg-white p-8 rounded-2xl border border-slate-100 shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">inventory_2</span>
                        <h2 class="text-lg font-bold text-slate-900">Ingredientes</h2>
                    </div>
                    <span id="total-ingredientes" class="text-xs font-medium text-slate-400">Total: 0</span>
                </div>
                <!-- Formulario para agregar ingrediente -->
                <div class="grid grid-cols-12 gap-4 p-4 bg-slate-50 rounded-xl mb-6 items-end">
                    <div class="col-span-6 flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-600 uppercase tracking-tight ml-1">Materia Prima</label>
                        <select id="select-materia" class="w-full appearance-none rounded-lg border-slate-200 bg-white px-4 py-2.5 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary transition-all">
                            <option value="">Cargando materias primas...</option>
                        </select>
                    </div>
                    <div class="col-span-3 flex flex-col gap-2">
                        <label class="text-xs font-bold text-slate-600 uppercase tracking-tight ml-1">Cantidad</label>
                        <input id="cantidad" type="number" step="0.01" class="w-full rounded-lg border-slate-200 bg-white px-4 py-2.5 text-slate-900 focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Ej. 1.5">
                    </div>
                    <div class="col-span-3">
                        <button id="btn-agregar" class="w-full h-[42px] bg-primary text-white rounded-lg font-bold text-sm flex items-center justify-center gap-2 hover:bg-primary/90 transition-all shadow-md shadow-primary/20">
                            <span class="material-symbols-outlined text-lg">add</span> Añadir
                        </button>
                    </div>
                </div>
                <!-- Tabla de ingredientes agregados temporalmente -->
                <div class="overflow-hidden border border-slate-100 rounded-xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 text-slate-500 uppercase text-[10px] font-bold tracking-widest">
                                <th class="px-6 py-4">Materia Prima</th>
                                <th class="px-6 py-4">Cantidad</th>
                                <th class="px-6 py-4 text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-ingredientes" class="divide-y divide-slate-50">
                            <tr class="text-center text-slate-400"><td colspan="3">No hay ingredientes agregados</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>
    <footer class="border-t border-slate-100 p-8 flex justify-end gap-4 bg-white">
        <a href="recetas.html" class="px-8 py-3 rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50 transition-all">Cancelar</a>
        <button id="btn-guardar" class="px-10 py-3 rounded-xl bg-primary text-white font-bold hover:bg-primary/95 transition-all shadow-lg shadow-primary/30 flex items-center gap-2">
            <span class="material-symbols-outlined">check_circle</span> Confirmar Receta
        </button>
    </footer>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
    }

    let materiasPrimas = [];    // lista de materias primas disponibles
    let ingredientesTemp = [];   // { id_materia, nombre, cantidad }

    // Cargar materias primas para el select
    async function cargarMateriasPrimas() {
        try {
            const res = await fetch(`${API_BASE}/materia_prima/`, { headers: getHeaders() });
            if (!res.ok) throw new Error();
            materiasPrimas = await res.json();
            const select = document.getElementById('select-materia');
            select.innerHTML = '<option value="">Seleccionar materia prima...</option>';
            materiasPrimas.forEach(mp => {
                const option = document.createElement('option');
                option.value = mp.id_materia;
                option.textContent = mp.descripcion;
                select.appendChild(option);
            });
        } catch (error) {
            console.error(error);
            document.getElementById('select-materia').innerHTML = '<option value="">Error al cargar</option>';
        }
    }

    // Agregar ingrediente a la lista temporal
    function agregarIngrediente() {
        const idMateria = parseInt(document.getElementById('select-materia').value);
        const cantidad = parseFloat(document.getElementById('cantidad').value);
        if (!idMateria) { alert('Seleccione una materia prima'); return; }
        if (isNaN(cantidad) || cantidad <= 0) { alert('Cantidad válida requerida'); return; }
        const materia = materiasPrimas.find(m => m.id_materia === idMateria);
        if (!materia) return;
        // Verificar si ya existe
        const existente = ingredientesTemp.find(i => i.id_materia === idMateria);
        if (existente) {
            existente.cantidad += cantidad;
        } else {
            ingredientesTemp.push({
                id_materia: idMateria,
                nombre: materia.descripcion,
                cantidad: cantidad
            });
        }
        renderizarTablaIngredientes();
        document.getElementById('select-materia').value = '';
        document.getElementById('cantidad').value = '';
    }

    // Eliminar ingrediente de la lista temporal
    function eliminarIngrediente(index) {
        ingredientesTemp.splice(index, 1);
        renderizarTablaIngredientes();
    }

    // Mostrar tabla de ingredientes
    function renderizarTablaIngredientes() {
        const tbody = document.getElementById('tabla-ingredientes');
        if (ingredientesTemp.length === 0) {
            tbody.innerHTML = '<tr class="text-center text-slate-400"><td colspan="3">No hay ingredientes agregados</td></tr>';
            document.getElementById('total-ingredientes').innerText = 'Total: 0';
            return;
        }
        tbody.innerHTML = '';
        ingredientesTemp.forEach((ing, idx) => {
            const fila = `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4"><div class="flex items-center gap-3"><div class="size-8 rounded bg-primary/5 flex items-center justify-center text-primary"><span class="material-symbols-outlined text-sm">package</span></div><span class="font-semibold text-slate-700">${escapeHtml(ing.nombre)}</span></div></td>
                    <td class="px-6 py-4 text-slate-600 font-medium">${ing.cantidad}</td>
                    <td class="px-6 py-4 text-right"><button class="eliminar-ingrediente text-slate-300 hover:text-red-600 transition-colors" data-index="${idx}"><span class="material-symbols-outlined">delete</span></button></td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', fila);
        });
        document.getElementById('total-ingredientes').innerText = `Total: ${ingredientesTemp.length}`;
        document.querySelectorAll('.eliminar-ingrediente').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                eliminarIngrediente(idx);
            });
        });
    }

    // Crear receta y luego asociar ingredientes
    async function crearRecetaYIngredientes() {
        const descripcion = document.getElementById('descripcion').value.trim();
        if (!descripcion) { alert('La descripción de la receta es obligatoria'); return; }
        if (ingredientesTemp.length === 0) { alert('Debe agregar al menos un ingrediente'); return; }

        try {
            // 1. Crear receta
            const resReceta = await fetch(`${API_BASE}/receta/recetas/`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ descripcion })
            });
            if (!resReceta.ok) throw new Error('Error al crear receta');
            const nuevaReceta = await resReceta.json();
            const idReceta = nuevaReceta.id_receta;

            // 2. Agregar cada ingrediente a receta_materia_prima
            for (const ing of ingredientesTemp) {
                await fetch(`${API_BASE}/receta_materia_prima/`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        id_receta: idReceta,
                        id_materia: ing.id_materia,
                        cantidad: ing.cantidad,
                        precio_diseno: 0,
                        precio_envio: 0
                    })
                });
            }
            alert('Receta creada correctamente');
            window.location.href = 'recetas.html';
        } catch (error) {
            alert('Error: ' + error.message);
        }
    }

    document.getElementById('btn-agregar').addEventListener('click', agregarIngrediente);
    document.getElementById('btn-guardar').addEventListener('click', crearRecetaYIngredientes);
    cargarMateriasPrimas();

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
</script>
</body>
</html>
