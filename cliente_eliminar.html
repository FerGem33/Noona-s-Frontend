<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#ec1337",
                    "background-light": "#f8f6f6",
                    "background-dark": "#221013",
                },
                fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    /* Estilos para las notificaciones toast */
    .toast-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        min-width: 280px;
        max-width: 380px;
        background: white;
        border-radius: 0.75rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        padding: 1rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        transform: translateX(400px);
        transition: transform 0.3s ease-out;
        border-left: 4px solid;
        pointer-events: auto;
    }
    .toast-notification.show {
        transform: translateX(0);
    }
    .toast-notification.success {
        border-left-color: #10b981;
    }
    .toast-notification.error {
        border-left-color: #ef4444;
    }
    .toast-notification.warning {
        border-left-color: #f59e0b;
    }
    .toast-icon {
        flex-shrink: 0;
    }
    .toast-content {
        flex: 1;
        font-size: 0.875rem;
        line-height: 1.4;
    }
    .toast-close {
        cursor: pointer;
        color: #9ca3af;
        transition: color 0.2s;
    }
    .toast-close:hover {
        color: #4b5563;
    }
</style>
<title>Nonna Admin - Confirmación de Eliminación</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background-dark/80 backdrop-blur-[2px]">
    <div class="relative w-full max-w-md transform overflow-hidden rounded-xl bg-white p-8 shadow-2xl transition-all dark:bg-slate-900 border-t-4 border-primary">
        <div class="flex flex-col items-center text-center">
            <div class="mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-primary/10 text-primary">
                <span class="material-symbols-outlined text-[48px] font-light">warning</span>
            </div>
            <h2 class="mb-2 text-2xl font-extrabold text-slate-900 dark:text-slate-100">¿Eliminar este cliente?</h2>
            <p class="mb-8 text-slate-500 dark:text-slate-400 leading-relaxed">
                Estás a punto de eliminar permanentemente el registro del cliente:
            </p>
            <div class="mb-8 w-full rounded-lg bg-slate-50 p-4 text-left border border-slate-100 dark:bg-slate-800 dark:border-slate-700">
                <div class="flex flex-col gap-1">
                    <span class="text-xs font-bold uppercase tracking-wider text-slate-400">Nombre Completo</span>
                    <span id="nombre-cliente" class="text-lg font-bold text-primary">Cargando...</span>
                </div>
            </div>
            <div class="flex w-full flex-col gap-3 sm:flex-row">
                <button id="btn-eliminar" class="flex flex-1 items-center justify-center rounded-lg bg-primary px-4 py-3 text-base font-bold text-white transition-colors hover:bg-primary/90">
                    Sí, Eliminar
                </button>
                <a href="clientes.html" class="flex flex-1 items-center justify-center rounded-lg border border-slate-200 bg-white px-4 py-3 text-base font-bold text-slate-700 transition-colors hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
                    No, Mantener
                </a>
            </div>
            <p class="mt-6 text-xs text-slate-400 dark:text-slate-500">
                Esta acción no se puede deshacer y borrará todo el historial relacionado.
            </p>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    // ---------- SISTEMA DE NOTIFICACIONES TOAST ----------
    function showToast(message, type = 'info', duration = 4000) {
        const toastContainer = document.getElementById('toast-container') || (() => {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.style.position = 'fixed';
            container.style.top = '20px';
            container.style.right = '20px';
            container.style.zIndex = '1000';
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '10px';
            document.body.appendChild(container);
            return container;
        })();

        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        
        let icon = '';
        if (type === 'success') icon = 'check_circle';
        else if (type === 'error') icon = 'error';
        else if (type === 'warning') icon = 'warning';
        else icon = 'info';
        
        toast.innerHTML = `
            <div class="toast-icon">
                <span class="material-symbols-outlined" style="color: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6'}">${icon}</span>
            </div>
            <div class="toast-content">${message}</div>
            <div class="toast-close">
                <span class="material-symbols-outlined text-sm">close</span>
            </div>
        `;
        
        toastContainer.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        
        toast.querySelector('.toast-close').addEventListener('click', () => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        });
        
        setTimeout(() => {
            if (toast.parentNode) {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }
        }, duration);
    }

    // Obtener ID del cliente desde la URL
    const urlParams = new URLSearchParams(window.location.search);
    const clienteId = urlParams.get('id');
    if (!clienteId) {
        showToast('No se especificó qué cliente eliminar.', 'error');
        setTimeout(() => { window.location.href = 'clientes.html'; }, 1500);
    }

    // Cargar datos del cliente para mostrar su nombre
    async function cargarCliente() {
        try {
            const res = await fetch(`${API_BASE}/cliente/${clienteId}`, { headers: getHeaders() });
            if (!res.ok) throw new Error(`Error ${res.status}`);
            const cliente = await res.json();
            const nombreCompleto = `${cliente.nombre || ''} ${cliente.apellido || ''}`.trim() || 'Cliente sin nombre';
            document.getElementById('nombre-cliente').innerText = nombreCompleto;
        } catch (error) {
            console.error(error);
            document.getElementById('nombre-cliente').innerText = 'Error al cargar datos';
            showToast('No se pudo cargar la información del cliente.', 'error');
        }
    }

    // Eliminar cliente (sin confirm adicional)
    async function eliminarCliente() {
        const btn = document.getElementById('btn-eliminar');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Eliminando...';
        btn.disabled = true;
        
        try {
            const res = await fetch(`${API_BASE}/cliente/${clienteId}`, { 
                method: 'DELETE', 
                headers: getHeaders() 
            });
            
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Error al eliminar el cliente');
            }
            
            showToast('Cliente eliminado correctamente', 'success');
            setTimeout(() => {
                window.location.href = 'clientes.html';
            }, 1500);
        } catch (error) {
            let errorMsg = error.message;
            if (errorMsg.includes('foreign key') || errorMsg.includes('referenced')) {
                errorMsg = 'No se puede eliminar este cliente porque tiene pedidos o direcciones asociadas. Elimina esos registros primero.';
            }
            showToast(`Error: ${errorMsg}`, 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    // Evento del botón eliminar (ya no hay confirm adicional porque el modal pide confirmación)
    document.getElementById('btn-eliminar').addEventListener('click', () => {
        eliminarCliente();
    });

    cargarCliente();
</script>
</body>
</html>
