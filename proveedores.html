<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Gestión de Proveedores - Nonna DB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#5D1927",
                    "background-light": "#FEBDC6",
                    "background-dark": "#1a1012",
                },
                fontFamily: {
                    display: ["Inter", "sans-serif"],
                },
                borderRadius: { DEFAULT: "0.75rem" },
            },
        },
    };
</script>
<style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen transition-colors duration-300">
<nav class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-md border-b border-primary/10 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            <div class="flex items-center gap-2">
                <span class="material-icons-outlined text-primary text-3xl">restaurant</span>
                <span class="text-2xl font-bold text-primary tracking-tight">Nonna</span>
            </div>
            <!-- ✅ Botón de regreso a CRUD's del Sistema (reemplaza perfil) -->
            <a href="index.html" class="flex items-center gap-2 text-primary hover:bg-primary/10 px-4 py-2 rounded-lg transition-colors">
                <span class="material-icons-outlined">arrow_back</span>
                <span class="font-medium">CRUD's del Sistema</span>
            </a>
        </div>
    </div>
</nav>
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="mb-8">
        <h1 class="text-4xl font-bold text-primary dark:text-pink-100 mb-2">GESTIÓN DE PROVEEDORES</h1>
        <p class="text-primary/70 dark:text-pink-200/60 font-medium">Panel administrativo de la base de datos Nonna</p>
    </div>
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div class="relative flex-1 max-w-md">
            <span class="material-icons-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/40 dark:text-pink-300/40">search</span>
            <input id="buscador" class="w-full pl-10 pr-4 py-2.5 rounded-xl border-none ring-1 ring-primary/20 dark:ring-white/10 bg-white/90 dark:bg-zinc-800/90 text-zinc-900 dark:text-white focus:ring-2 focus:ring-primary transition-all" placeholder="Buscar por nombre, ubicación..." type="text">
        </div>
        <a href="proveedor_form.html" class="bg-primary hover:bg-primary/90 text-white px-6 py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-lg shadow-primary/20">
            <span class="material-icons-outlined text-[20px]">add</span>
            Nuevo Proveedor
        </a>
    </div>
    <div class="bg-white dark:bg-zinc-900 rounded-3xl shadow-xl shadow-primary/5 overflow-hidden border border-primary/5 dark:border-white/5">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-primary/5 dark:bg-white/5">
                        <th class="px-6 py-4 text-xs font-bold text-primary/70 dark:text-pink-200/50 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary/70 dark:text-pink-200/50 uppercase tracking-wider">Descripción (Nombre)</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary/70 dark:text-pink-200/50 uppercase tracking-wider">Dirección</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary/70 dark:text-pink-200/50 uppercase tracking-wider">Contacto (Teléfono)</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary/70 dark:text-pink-200/50 uppercase tracking-wider text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-proveedores" class="divide-y divide-primary/5 dark:divide-white/5">
                    <tr><td colspan="5" class="text-center py-10 text-primary/50">Cargando proveedores...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="px-6 py-4 bg-primary/[0.02] dark:bg-white/[0.02] border-t border-primary/5 dark:border-white/5 flex items-center justify-between">
            <span id="total-registros" class="text-sm text-primary/60 dark:text-pink-300/50">Cargando...</span>
            <div class="flex gap-2">
                <button class="p-2 rounded-lg border border-primary/20 dark:border-white/10 text-primary dark:text-pink-300 disabled:opacity-30" disabled>←</button>
                <button class="p-2 rounded-lg border border-primary/20 dark:border-white/10 text-primary dark:text-pink-300 hover:bg-primary/5 transition-colors" disabled>→</button>
            </div>
        </div>
    </div>
</main>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    async function listarProveedores() {
        const res = await fetch(`${API_BASE}/proveedor/`, { headers: getHeaders() });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
    }

    let todosProveedores = [];

    function renderizarTabla(proveedores) {
        const tbody = document.getElementById('tabla-proveedores');
        if (!proveedores.length) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-primary/50">No hay proveedores. ¡Agrega el primero!</td></tr>`;
            document.getElementById('total-registros').innerText = 'Mostrando 0 proveedores';
            return;
        }
        tbody.innerHTML = '';
        proveedores.forEach(prov => {
            const fila = `
                <tr class="hover:bg-primary/[0.02] dark:hover:bg-white/[0.02] transition-colors">
                    <td class="px-6 py-5 text-primary/70">${prov.id_proveedor}</td>
                    <td class="px-6 py-5"><div class="font-semibold text-zinc-900 dark:text-white">${escapeHtml(prov.descripcion)}</div></td>
                    <td class="px-6 py-5"><div class="flex items-center gap-1.5 text-zinc-600 dark:text-zinc-400"><span class="material-icons-outlined text-sm text-primary/40">place</span> ${escapeHtml(prov.direccion || '—')}</div></td>
                    <td class="px-6 py-5"><div class="flex items-center gap-1.5 text-zinc-600 dark:text-zinc-400 font-mono"><span class="material-icons-outlined text-sm text-primary/40">phone</span> ${escapeHtml(prov.contacto || '—')}</div></td>
                    <td class="px-6 py-5 text-right">
                        <div class="flex justify-end gap-2">
                            <a href="editar_proveedor.html?id=${prov.id_proveedor}" class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors" title="Editar">
                                <span class="material-icons-outlined text-[20px]">edit</span>
                            </a>
                            <a href="eliminar_proveedor.html?id=${prov.id_proveedor}" class="p-2 text-primary hover:bg-red-500/10 rounded-full transition-colors" title="Eliminar">
                                <span class="material-icons-outlined text-[20px]">delete</span>
                            </a>
                        </div>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('beforeend', fila);
        });
        document.getElementById('total-registros').innerText = `Mostrando ${proveedores.length} de ${todosProveedores.length} proveedores`;
    }

    async function cargarProveedores() {
        const tbody = document.getElementById('tabla-proveedores');
        tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-primary/50">Cargando...</td></tr>`;
        try {
            todosProveedores = await listarProveedores();
            renderizarTabla(todosProveedores);
        } catch (error) {
            let mensaje = error.message.includes('401') ? 'Token inválido' : (error.message.includes('Failed to fetch') ? 'Error de conexión' : error.message);
            tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-red-500">Error: ${mensaje}</td></tr>`;
        }
    }

    document.getElementById('buscador')?.addEventListener('input', (e) => {
        const texto = e.target.value.toLowerCase();
        if (!texto.trim()) return renderizarTabla(todosProveedores);
        const filtrados = todosProveedores.filter(p => p.descripcion?.toLowerCase().includes(texto) || p.direccion?.toLowerCase().includes(texto) || p.contacto?.toLowerCase().includes(texto));
        renderizarTabla(filtrados);
    });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    cargarProveedores();
</script>
</body>
</html>
