<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Nonna - Materia Prima</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Montserrat:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#5d1927",
            "accent-pink": "#FEBDC6",
            "background-light": "#f8f6f6",
            "background-dark": "#1f1316",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "Montserrat", "sans-serif"],
            "sans": ["Montserrat", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "2xl": "1rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    body {
      font-family: 'Montserrat', sans-serif;
    }
    .modal-mensaje {
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
  </style>
</head>
<body class="bg-accent-pink min-h-screen flex items-center justify-center p-4 md:p-8">
  <div class="bg-white dark:bg-background-dark w-full max-w-[1280px] min-h-[600px] max-h-[900px] overflow-hidden rounded-2xl shadow-2xl flex flex-col">
    <header class="flex items-center justify-between px-8 py-6 border-b border-primary/10">
      <div class="flex items-center gap-3">
        <div class="text-primary">
          <span class="material-symbols-outlined text-3xl">bakery_dining</span>
        </div>
        <div>
          <h1 id="form-titulo" class="text-primary text-2xl font-bold tracking-tight">Agregar Materia Prima</h1>
          <p class="text-primary/60 text-sm font-medium">Nonna Bakery System - Control de Inventario</p>
        </div>
      </div>
      <a href="materia_prima.html" class="text-primary/40 hover:text-primary transition-colors p-2 rounded-full hover:bg-primary/5">
        <span class="material-symbols-outlined text-2xl">close</span>
      </a>
    </header>

    <div class="flex-1 overflow-y-auto p-8 lg:p-12">
      <div class="max-w-4xl mx-auto">
        <form id="form-materia" class="space-y-8">
          <!-- Descripción -->
          <div class="space-y-2">
            <label class="block text-primary font-semibold text-sm uppercase tracking-wider">Nombre (Descripción)</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/40">description</span>
              <input id="descripcion" type="text" class="w-full pl-10 pr-4 py-3 rounded-lg border border-primary/20 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 bg-background-light/30" placeholder="Ej. Harina de Trigo" required>
            </div>
          </div>

          <!-- Unidad de Medida -->
          <div class="space-y-2">
            <label class="block text-primary font-semibold text-sm uppercase tracking-wider">Unidad de Medida</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/40">straighten</span>
              <select id="id_unidad" class="w-full pl-10 pr-4 py-3 rounded-lg border border-primary/20 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none appearance-none transition-all text-slate-900 bg-background-light/30" required>
                <option value="">Cargando unidades...</option>
              </select>
              <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-primary/40 pointer-events-none">expand_more</span>
            </div>
          </div>

          <!-- PRECIO UNITARIO OCULTO (para cumplir con la API) -->
          <input type="hidden" id="precio_unitario" value="0">

          <!-- Stock, Mínimo, Máximo -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-2">
              <label class="block text-primary font-semibold text-sm uppercase tracking-wider">Stock Actual</label>
              <input id="stock_actual" type="number" step="1" class="w-full px-4 py-3 rounded-lg border border-primary/20 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none" value="0" required>
            </div>
            <div class="space-y-2">
              <label class="block text-primary font-semibold text-sm uppercase tracking-wider">Mínimo</label>
              <input id="minimo" type="number" step="1" class="w-full px-4 py-3 rounded-lg border border-primary/20 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none" value="0">
            </div>
            <div class="space-y-2">
              <label class="block text-primary font-semibold text-sm uppercase tracking-wider">Máximo</label>
              <input id="maximo" type="number" step="1" class="w-full px-4 py-3 rounded-lg border border-primary/20 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none" value="0">
            </div>
          </div>

          <!-- Activo -->
          <div class="flex items-center gap-3">
            <input type="checkbox" id="activo" class="w-5 h-5 text-primary rounded border-primary/30 focus:ring-primary" checked>
            <label for="activo" class="text-primary font-semibold text-sm uppercase tracking-wider">Activo</label>
          </div>

          <!-- Botones -->
          <div class="flex items-center justify-end gap-4 pt-6 border-t border-primary/10">
            <a href="materia_prima.html" class="px-8 py-3 rounded-lg text-primary font-bold hover:bg-primary/5 transition-all">Cancelar</a>
            <button type="submit" class="px-10 py-3 rounded-lg bg-primary text-white font-bold hover:bg-primary/90 shadow-lg shadow-primary/20 transition-all flex items-center gap-2 active:scale-95">
              <span class="material-symbols-outlined text-xl">save</span>
              Guardar Materia Prima
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- MODALES -->
  <div id="modal-exito" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
      <div class="mx-auto mb-4"><span class="material-symbols-outlined text-green-600 text-5xl">check_circle</span></div>
      <h3 id="exito-titulo" class="text-xl font-bold text-slate-900">¡Éxito!</h3>
      <p id="exito-mensaje" class="text-slate-500 mt-2"></p>
      <button id="btn-cerrar-exito" class="mt-6 w-full bg-primary text-white font-bold py-2 px-4 rounded-xl hover:bg-primary/90 transition-colors">Continuar</button>
    </div>
  </div>

  <div id="modal-error" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
      <div class="mx-auto mb-4"><span class="material-symbols-outlined text-red-600 text-5xl">error</span></div>
      <h3 class="text-xl font-bold text-slate-900">Error</h3>
      <p id="error-mensaje" class="text-slate-500 mt-2"></p>
      <button id="btn-cerrar-error" class="mt-6 w-full bg-primary text-white font-bold py-2 px-4 rounded-xl hover:bg-primary/90 transition-colors">Aceptar</button>
    </div>
  </div>

  <script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
      return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
    }

    const urlParams = new URLSearchParams(window.location.search);
    const materiaId = urlParams.get('id');

    function mostrarExito(titulo, mensaje, callback) {
      const modal = document.getElementById('modal-exito');
      document.getElementById('exito-titulo').innerText = titulo;
      document.getElementById('exito-mensaje').innerText = mensaje;
      modal.classList.remove('hidden');
      document.getElementById('btn-cerrar-exito').onclick = () => {
        modal.classList.add('hidden');
        if (callback) callback();
      };
    }

    function mostrarError(mensaje, callback) {
      const modal = document.getElementById('modal-error');
      document.getElementById('error-mensaje').innerText = mensaje;
      modal.classList.remove('hidden');
      document.getElementById('btn-cerrar-error').onclick = () => {
        modal.classList.add('hidden');
        if (callback) callback();
      };
    }

    async function crearMateria(datos) {
      const res = await fetch(`${API_BASE}/materia_prima/`, { method: 'POST', headers: getHeaders(), body: JSON.stringify(datos) });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(JSON.stringify(err.detail || err));
      }
      return res.json();
    }

    async function actualizarMateria(id, datos) {
      const res = await fetch(`${API_BASE}/materia_prima/${id}`, { method: 'PUT', headers: getHeaders(), body: JSON.stringify(datos) });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(JSON.stringify(err.detail || err));
      }
      return res.json();
    }

    async function obtenerMateria(id) {
      const res = await fetch(`${API_BASE}/materia_prima/${id}`, { headers: getHeaders() });
      if (!res.ok) throw new Error(`Error ${res.status}`);
      return res.json();
    }

    async function listarUnidades() {
      const res = await fetch(`${API_BASE}/unidad_medida/`, { headers: getHeaders() });
      if (!res.ok) throw new Error('No se pudieron cargar las unidades');
      return res.json();
    }

    async function cargarUnidadesSelect() {
      try {
        const unidades = await listarUnidades();
        const select = document.getElementById('id_unidad');
        select.innerHTML = '<option value="">Seleccione una unidad</option>';
        unidades.forEach(u => {
          const option = document.createElement('option');
          option.value = u.id_unidad;
          option.textContent = `${u.descripcion} (${u.abreviatura})`;
          select.appendChild(option);
        });
      } catch (error) {
        mostrarError('No se pudieron cargar las unidades de medida.');
      }
    }

    async function cargarDatosEdicion() {
      if (!materiaId) return;
      try {
        const materia = await obtenerMateria(materiaId);
        document.getElementById('descripcion').value = materia.descripcion || '';
        // Asignamos el precio real al campo oculto para preservarlo en la actualización
        document.getElementById('precio_unitario').value = materia.precio_unitario || 0;
        document.getElementById('stock_actual').value = materia.stock_actual || 0;
        document.getElementById('minimo').value = materia.minimo || 0;
        document.getElementById('maximo').value = materia.maximo || 0;
        document.getElementById('activo').checked = materia.activo === true;
        if (materia.id_unidad) document.getElementById('id_unidad').value = materia.id_unidad;
        document.getElementById('form-titulo').innerText = 'Editar Materia Prima';
      } catch (error) {
        mostrarError('Error al cargar los datos', () => window.location.href = 'materia_prima.html');
      }
    }

    document.getElementById('form-materia').addEventListener('submit', async (e) => {
      e.preventDefault();
      const idUnidad = parseInt(document.getElementById('id_unidad').value);
      if (isNaN(idUnidad) || idUnidad < 1) {
        mostrarError('Seleccione una unidad de medida válida');
        return;
      }
      const descripcion = document.getElementById('descripcion').value.trim();
      const precio_unitario = parseFloat(document.getElementById('precio_unitario').value);
      const stock_actual = parseFloat(document.getElementById('stock_actual').value) || 0;
      const minimo = parseFloat(document.getElementById('minimo').value) || 0;
      const maximo = parseFloat(document.getElementById('maximo').value) || 0;
      const activo = document.getElementById('activo').checked;

      if (!descripcion) { mostrarError('La descripción es obligatoria'); return; }
      // No validamos precio_unitario porque es oculto y tiene valor por defecto (0 o el existente)
      if (stock_actual < 0) { mostrarError('El stock no puede ser negativo'); return; }

      const datos = { id_unidad: idUnidad, descripcion, precio_unitario, minimo, maximo, stock_actual, imagen: "", activo };
      try {
        if (materiaId) {
          await actualizarMateria(materiaId, datos);
          mostrarExito('¡Actualizada!', 'Materia prima actualizada correctamente.', () => window.location.href = 'materia_prima.html');
        } else {
          await crearMateria(datos);
          mostrarExito('¡Creada!', 'Materia prima creada correctamente.', () => window.location.href = 'materia_prima.html');
        }
      } catch (error) {
        mostrarError('Error al guardar: ' + error.message);
      }
    });

    document.addEventListener('DOMContentLoaded', async () => {
      await cargarUnidadesSelect();
      await cargarDatosEdicion();
    });
  </script>
</body>
</html>
