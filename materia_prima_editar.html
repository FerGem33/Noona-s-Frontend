<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Nonna - Editar Materia Prima</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#5d1927",
            "accent-pink": "#FEBDC6",
            "background-light": "#f8f6f6",
            "background-dark": "#1f1316",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #FEBDC6;
    }
    .custom-select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%235d1927' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-position: right 0.5rem center;
      background-repeat: no-repeat;
      background-size: 1.5em 1.5em;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<div class="w-full max-w-[1280px] h-full max-h-[960px] flex items-center justify-center">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-[800px] overflow-hidden flex flex-col">
    <!-- Header Section -->
    <div class="p-8 border-b border-primary/10 flex justify-between items-start">
      <div class="flex flex-col gap-1">
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary text-3xl">edit_note</span>
          <h1 class="text-primary text-3xl font-bold tracking-tight">Editar Materia Prima</h1>
        </div>
        <p class="text-primary/70 text-base">Modifica los detalles técnicos y niveles de inventario del insumo.</p>
      </div>
      <a href="materia_prima.html" class="text-primary/40 hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-3xl">close</span>
      </a>
    </div>

    <!-- Form Content -->
    <form id="form-editar" class="flex flex-col">
      <div class="p-8 space-y-6">
        <!-- Fila 1: Nombre (Descripción) -->
        <div class="grid grid-cols-1 gap-4">
          <label class="flex flex-col gap-2">
            <span class="text-primary font-semibold text-sm uppercase tracking-wider">Nombre (Descripción)</span>
            <input id="descripcion" class="w-full h-14 px-4 rounded-lg border border-primary/20 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 outline-none" placeholder="Ej. Harina de Trigo 000" type="text" required>
          </label>
        </div>

        <!-- Fila 2: Unidad de Medida & Precio -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <label class="flex flex-col gap-2">
            <span class="text-primary font-semibold text-sm uppercase tracking-wider">Unidad de Medida</span>
            <select id="id_unidad" class="custom-select w-full h-14 px-4 rounded-lg border border-primary/20 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 outline-none bg-white" required>
              <option value="">Cargando unidades...</option>
            </select>
          </label>
          <label class="flex flex-col gap-2">
            <span class="text-primary font-semibold text-sm uppercase tracking-wider">Precio por Unidad</span>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 font-medium">$</span>
              <input id="precio_unitario" class="w-full h-14 pl-8 pr-4 rounded-lg border border-primary/20 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all text-slate-900 outline-none" placeholder="1.450" type="number" step="0.01" required>
            </div>
          </label>
        </div>

        <!-- Fila 3: Stock, Mínimo, Máximo, Activo (campos adicionales requeridos por la API) -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <label class="flex flex-col gap-2">
            <span class="text-primary font-semibold text-sm uppercase tracking-wider">Stock Actual</span>
            <input id="stock_actual" type="number" step="0.01" class="w-full h-14 px-4 rounded-lg border border-primary/20 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" value="0" required>
          </label>
          <label class="flex flex-col gap-2">
            <span class="text-primary font-semibold text-sm uppercase tracking-wider">Mínimo</span>
            <input id="minimo" type="number" step="0.01" class="w-full h-14 px-4 rounded-lg border border-primary/20 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" value="0">
          </label>
          <label class="flex flex-col gap-2">
            <span class="text-primary font-semibold text-sm uppercase tracking-wider">Máximo</span>
            <input id="maximo" type="number" step="0.01" class="w-full h-14 px-4 rounded-lg border border-primary/20 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none" value="0">
          </label>
          <label class="flex flex-col gap-2">
            <span class="text-primary font-semibold text-sm uppercase tracking-wider">Activo</span>
            <div class="flex items-center h-14">
              <input id="activo" type="checkbox" class="w-5 h-5 text-primary rounded border-primary/20 focus:ring-primary/20" checked>
            </div>
          </label>
        </div>
      </div>

      <!-- Footer Actions -->
      <div class="p-8 bg-slate-50 border-t border-primary/10 flex flex-col sm:flex-row justify-end gap-4">
        <a href="materia_prima.html" class="px-8 py-3 rounded-lg text-primary font-bold hover:bg-primary/5 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">cancel</span>
          Cancelar
        </a>
        <button type="submit" class="px-10 py-3 rounded-lg bg-primary text-white font-bold shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">save</span>
          Guardar Cambios
        </button>
      </div>
    </form>

    <div class="h-2 w-full bg-gradient-to-r from-primary via-primary/80 to-primary"></div>
  </div>
</div>

<script>
  // ==================== CONFIGURACIÓN ====================
  const API_BASE = 'http://3.15.13.161:8000/api';
  const TOKEN = localStorage.token;

  function getHeaders() {
    return {
      'accept': 'application/json',
      'Authorization': `Bearer ${TOKEN}`,
      'Content-Type': 'application/json'
    };
  }

  // Obtener ID de la URL (?id=xxx)
  const urlParams = new URLSearchParams(window.location.search);
  const materiaId = urlParams.get('id');

  if (!materiaId) {
    alert('No se especificó qué materia prima editar. Redirigiendo al listado.');
    window.location.href = 'materia_prima.html';
  }

  // ==================== API FUNCTIONS ====================
  async function obtenerMateria(id) {
    const res = await fetch(`${API_BASE}/materia_prima/${id}`, { headers: getHeaders() });
    if (!res.ok) throw new Error(`Error ${res.status}: ${res.statusText}`);
    return res.json();
  }

  async function actualizarMateria(id, datos) {
    const res = await fetch(`${API_BASE}/materia_prima/${id}`, {
      method: 'PUT',
      headers: getHeaders(),
      body: JSON.stringify(datos)
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(JSON.stringify(err.detail || err));
    }
    return res.json();
  }

  async function listarUnidades() {
    const res = await fetch(`${API_BASE}/unidad_medida/`, { headers: getHeaders() });
    if (!res.ok) throw new Error('No se pudieron cargar las unidades');
    return res.json();
  }

  // ==================== CARGAR UNIDADES ====================
  async function cargarUnidadesSelect(unidadSeleccionadaId) {
    try {
      const unidades = await listarUnidades();
      const select = document.getElementById('id_unidad');
      select.innerHTML = '<option value="">Seleccione una unidad</option>';
      unidades.forEach(u => {
        const option = document.createElement('option');
        option.value = u.id_unidad;
        option.textContent = u.nombre || `Unidad ${u.id_unidad}`;
        if (unidadSeleccionadaId && u.id_unidad == unidadSeleccionadaId) {
          option.selected = true;
        }
        select.appendChild(option);
      });
      if (unidades.length === 0) {
        select.innerHTML = '<option value="">No hay unidades creadas</option>';
      }
    } catch (error) {
      console.error(error);
      const select = document.getElementById('id_unidad');
      select.innerHTML = '<option value="">Error al cargar unidades</option>';
    }
  }

  // ==================== CARGAR DATOS DE LA MATERIA PRIMA ====================
  async function cargarDatos() {
    try {
      const materia = await obtenerMateria(materiaId);
      // Llenar campos del formulario
      document.getElementById('descripcion').value = materia.descripcion || '';
      document.getElementById('precio_unitario').value = materia.precio_unitario || '';
      document.getElementById('stock_actual').value = materia.stock_actual || 0;
      document.getElementById('minimo').value = materia.minimo || 0;
      document.getElementById('maximo').value = materia.maximo || 0;
      document.getElementById('activo').checked = materia.activo === true;
      // Cargar select de unidades y seleccionar la actual
      await cargarUnidadesSelect(materia.id_unidad);
    } catch (error) {
      console.error(error);
      alert('Error al cargar los datos: ' + error.message);
      // Si falla, redirigir al listado
      window.location.href = 'materia_prima.html';
    }
  }

  // ==================== GUARDAR CAMBIOS ====================
  const form = document.getElementById('form-editar');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const idUnidad = parseInt(document.getElementById('id_unidad').value);
    if (isNaN(idUnidad) || idUnidad < 1) {
      alert('Seleccione una unidad de medida válida');
      return;
    }
    const datos = {
      id_unidad: idUnidad,
      descripcion: document.getElementById('descripcion').value.trim(),
      precio_unitario: parseFloat(document.getElementById('precio_unitario').value),
      minimo: parseFloat(document.getElementById('minimo').value) || 0,
      maximo: parseFloat(document.getElementById('maximo').value) || 0,
      stock_actual: parseFloat(document.getElementById('stock_actual').value) || 0,
      imagen: "",  
      activo: document.getElementById('activo').checked
    };
    if (!datos.descripcion) { alert('La descripción es obligatoria'); return; }
    if (isNaN(datos.precio_unitario) || datos.precio_unitario <= 0) { alert('El precio debe ser mayor a 0'); return; }
    if (datos.stock_actual < 0) { alert('El stock no puede ser negativo'); return; }

    try {
      await actualizarMateria(materiaId, datos);
      alert('Materia prima actualizada correctamente');
      window.location.href = 'materia_prima.html';
    } catch (error) {
      alert('Error al guardar: ' + error.message);
    }
  });

  // Inicializar
  cargarDatos();
</script>
</body>
</html>
