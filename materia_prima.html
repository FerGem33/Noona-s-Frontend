<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Nonna - Gestión de Materia Prima</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Montserrat:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: { "primary": "#5d1927", "brand-pink": "#FEBDC6", "background-light": "#f8f6f6", "background-dark": "#1f1316" },
          fontFamily: { "display": ["Montserrat", "Plus Jakarta Sans", "sans-serif"] },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px", "ROUND_EIGHT": "0.5rem" },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Montserrat', sans-serif; background-color: #FEBDC6; }
  </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-center p-8">
<div class="w-full max-w-[1760px] flex flex-col gap-6">
  <div class="flex items-center justify-between w-full px-4">
    <a class="flex items-center gap-2 text-primary font-semibold hover:opacity-80 transition-opacity" href="index.html">
      <span class="material-symbols-outlined">arrow_back</span>
      <span>CRUD's del Sistema</span>
    </a>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-3 text-primary">
        <div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
          <span class="material-symbols-outlined text-lg">bakery_dining</span>
        </div>
        <h1 class="text-2xl font-bold tracking-tight">Nonna</h1>
      </div>
    </div>
  </div>
  <main class="w-full bg-white rounded-ROUND_EIGHT shadow-xl overflow-hidden min-h-[800px] flex flex-col">
    <div class="p-8 border-b border-slate-100 flex items-center justify-between bg-white">
      <div>
        <h2 class="text-3xl font-extrabold text-primary">Gestión de Materia Prima</h2>
        <p class="text-slate-500 mt-1">Administración centralizada de insumos</p>
      </div>
      <div class="flex gap-4">
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
          <input id="buscador" class="pl-10 pr-4 py-2 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-primary/20 w-64 text-sm" placeholder="Buscar Materia Prima..." type="text">
        </div>
        <a href="materia_prima_form.html" class="bg-primary text-white px-6 py-2.5 rounded-lg font-bold text-sm flex items-center gap-2 hover:bg-primary/90 transition-colors shadow-sm">
          <span class="material-symbols-outlined text-lg">add_circle</span>
          Agregar Materia Prima
        </a>
      </div>
    </div>
    <div class="flex-1 overflow-x-auto p-8">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="text-slate-500 text-sm font-semibold uppercase tracking-wider border-b border-slate-100">
            <th class="px-4 py-5 font-bold">ID</th>
            <th class="px-4 py-5 font-bold">Descripción</th>
            <th class="px-4 py-5 font-bold text-center">U. Medida</th>
            <th class="px-4 py-5 font-bold text-center">Stock Actual</th>
            <th class="px-4 py-5 font-bold text-right">Acciones</th>
           </>
        </thead>
        <tbody id="tabla-materia-body" class="divide-y divide-slate-50">
          <tr><td colspan="5" class="text-center py-10 text-slate-400">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <footer class="text-center py-4 text-primary/60 text-sm font-medium">© 2024 Nonna Bakery - Sistema de Gestión de Panadería Profesional</footer>
</div>

<script>
  const API_BASE = 'http://3.15.13.161:8000/api';
  const TOKEN = localStorage.token;

  function getHeaders() {
    return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
  }

  async function listarMaterias() {
    const res = await fetch(`${API_BASE}/materia_prima/`, { headers: getHeaders() });
    if (!res.ok) throw new Error(`Error ${res.status}`);
    return res.json();
  }

  async function listarUnidades() {
    const res = await fetch(`${API_BASE}/unidad_medida/`, { headers: getHeaders() });
    if (!res.ok) throw new Error('Error cargando unidades');
    return res.json();
  }

  async function eliminarMateria(id) {
    const res = await fetch(`${API_BASE}/materia_prima/${id}`, { method: 'DELETE', headers: getHeaders() });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || 'Error al eliminar');
    }
    return res.json();
  }

  let todasMaterias = [];
  let unidadesMap = {};

  async function cargarUnidadesMap() {
    try {
      const unidades = await listarUnidades();
      unidadesMap = {};
      unidades.forEach(u => {
        const texto = u.descripcion ? `${u.descripcion} (${u.abreviatura})` : `Unidad ${u.id_unidad}`;
        unidadesMap[u.id_unidad] = texto;
      });
    } catch (error) { console.error(error); }
  }

  function renderizarTabla(materias) {
    const tbody = document.getElementById('tabla-materia-body');
    if (!materias.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-400">No hay materias primas. ¡Agrega la primera!</td></tr>`;
      return;
    }
    tbody.innerHTML = '';
    materias.forEach(mat => {
      // 🔥 CORRECCIÓN: usar el campo correcto 'stock_actual' en lugar de 'stock'
      const stock = (mat.stock_actual !== undefined && mat.stock_actual !== null) ? mat.stock_actual : 0;
      const unidadNombre = unidadesMap[mat.id_unidad] || `ID: ${mat.id_unidad}`;
      // Opcional: destacar si stock es bajo (por ejemplo, menor que el mínimo)
      const stockClass = (mat.minimo && stock < mat.minimo) ? 'text-red-600 font-bold' : 'text-slate-900 font-medium';
      const fila = `
        <tr class="hover:bg-slate-50/50 transition-colors group">
          <td class="px-4 py-5 text-slate-600 font-medium">${mat.id_materia}</td>
          <td class="px-4 py-5 text-slate-900 font-semibold">${escapeHtml(mat.descripcion)}</td>
          <td class="px-4 py-5 text-center text-slate-600">${escapeHtml(unidadNombre)}</td>
          <td class="px-4 py-5 text-center ${stockClass}">${stock}</td>
          <td class="px-4 py-5 text-right">
            <div class="flex justify-end gap-2">
              <a href="materia_prima_form.html?id=${mat.id_materia}" class="p-2 text-primary hover:bg-primary/10 rounded-lg transition-colors" title="Editar">
                <span class="material-symbols-outlined">edit_note</span>
              </a>
              <a href="materia_prima_eliminar.html?id=${mat.id_materia}" class="p-2 text-primary hover:bg-red-50 rounded-lg transition-colors" title="Eliminar">
                <span class="material-symbols-outlined">delete_sweep</span>
              </a>
            </div>
          </td>
        </td>
      `;
      tbody.insertAdjacentHTML('beforeend', fila);
    });
  }

  async function cargarMaterias() {
    const tbody = document.getElementById('tabla-materia-body');
    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-slate-400">Cargando...</td></tr>`;
    try {
      todasMaterias = await listarMaterias();
      await cargarUnidadesMap();
      renderizarTabla(todasMaterias);
    } catch (error) {
      let mensaje = error.message;
      if (mensaje.includes('401')) mensaje = 'Token inválido. Actualiza TOKEN.';
      else if (mensaje.includes('Failed to fetch')) mensaje = 'Error de CORS o conexión. Usa Live Server.';
      tbody.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-red-500">Error: ${mensaje}</td></tr>`;
    }
  }

  document.getElementById('buscador')?.addEventListener('input', (e) => {
    const texto = e.target.value.toLowerCase();
    if (!texto.trim()) return renderizarTabla(todasMaterias);
    const filtradas = todasMaterias.filter(mat => mat.descripcion?.toLowerCase().includes(texto));
    renderizarTabla(filtradas);
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'); });
  }

  cargarMaterias();
</script>
</body>
</html>
