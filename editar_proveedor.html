<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Editar Proveedor - Nonna DB</title>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#5d1927",
                    "background-light": "#FEBDC6",
                    "background-dark": "#0f172a",
                },
                fontFamily: {
                    display: ["Outfit", "sans-serif"],
                },
                borderRadius: {
                    DEFAULT: "0.75rem",
                },
            },
        },
    };
</script>
<style>
    body { font-family: 'Outfit', sans-serif; }
    .modal-mensaje {
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }
</style>
</head>
<body class="dark:bg-background-dark min-h-screen transition-colors duration-300" style="background-color: #FEBDC6;">
<main class="max-w-4xl mx-auto px-6 py-12">
    <header class="mb-10">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Editar Proveedor</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-2">Actualice la información técnica y de contacto del proveedor en la base de datos Nonna.</p>
    </header>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-xl shadow-pink-100 dark:shadow-none border border-pink-50 dark:border-slate-800">
            <form id="form-editar" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">ID Proveedor</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400 material-icons-outlined text-xl">key</span>
                            <input id="id_proveedor" class="pl-10 block w-full bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 rounded-lg cursor-not-allowed focus:ring-0" type="text" readonly>
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Descripción *</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400 material-icons-outlined text-xl">description</span>
                            <input id="descripcion" class="pl-10 block w-full bg-white dark:bg-slate-900 border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg focus:ring-primary focus:border-primary transition-all" type="text" required>
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Dirección</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400 material-icons-outlined text-xl">location_on</span>
                            <input id="direccion" class="pl-10 block w-full bg-white dark:bg-slate-900 border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg focus:ring-primary focus:border-primary transition-all" type="text">
                        </div>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Contacto (Teléfono)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-3 text-slate-400 material-icons-outlined text-xl">phone</span>
                            <input id="contacto" class="pl-10 block w-full bg-white dark:bg-slate-900 border-slate-300 dark:border-slate-700 text-slate-900 dark:text-white rounded-lg focus:ring-primary focus:border-primary transition-all" type="text">
                        </div>
                    </div>
                </div>
                <div class="pt-6 flex flex-col sm:flex-row gap-4">
                    <button type="submit" id="btn-submit" class="flex-1 bg-primary hover:bg-primary/90 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-lg shadow-pink-200 dark:shadow-none flex items-center justify-center gap-2">
                        <span class="material-icons-outlined text-xl">save</span>
                        Actualizar Datos
                    </button>
                    <a href="proveedores.html" class="flex-1 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700 font-semibold py-3 px-6 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</main>

<!-- MODAL DE ÉXITO -->
<div id="modal-exito" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white dark:bg-slate-800 rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
        <div class="mx-auto mb-4">
            <span class="material-icons-outlined text-green-600 dark:text-green-400 text-5xl">check_circle</span>
        </div>
        <h3 class="text-xl font-bold text-slate-900 dark:text-white">¡Éxito!</h3>
        <p id="exito-mensaje" class="text-slate-500 dark:text-slate-300 mt-2"></p>
        <button id="btn-cerrar-exito" class="mt-6 w-full bg-primary text-white font-bold py-2 px-4 rounded-xl hover:bg-primary/90 transition-colors">Continuar</button>
    </div>
</div>

<!-- MODAL DE ERROR -->
<div id="modal-error" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white dark:bg-slate-800 rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
        <div class="mx-auto mb-4">
            <span class="material-icons-outlined text-red-600 dark:text-red-400 text-5xl">error</span>
        </div>
        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Error</h3>
        <p id="error-mensaje" class="text-slate-500 dark:text-slate-300 mt-2"></p>
        <button id="btn-cerrar-error" class="mt-6 w-full bg-primary text-white font-bold py-2 px-4 rounded-xl hover:bg-primary/90 transition-colors">Aceptar</button>
    </div>
</div>

<!-- MODAL DE VALIDACIÓN (advertencia) -->
<div id="modal-warning" class="fixed inset-0 flex items-center justify-center z-[60] hidden modal-mensaje">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white dark:bg-slate-800 rounded-2xl max-w-sm w-full mx-4 p-6 shadow-2xl text-center">
        <div class="mx-auto mb-4">
            <span class="material-icons-outlined text-amber-500 text-5xl">warning</span>
        </div>
        <h3 class="text-xl font-bold text-slate-900 dark:text-white">Campos incompletos</h3>
        <p id="warning-mensaje" class="text-slate-500 dark:text-slate-300 mt-2"></p>
        <button id="btn-cerrar-warning" class="mt-6 w-full bg-primary text-white font-bold py-2 px-4 rounded-xl hover:bg-primary/90 transition-colors">Aceptar</button>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    if (!TOKEN) {
        const modal = document.getElementById('modal-error');
        document.getElementById('error-mensaje').innerText = 'No hay sesión activa. Redirigiendo al login...';
        modal.classList.remove('hidden');
        document.getElementById('btn-cerrar-error').onclick = () => {
            window.location.href = 'index.html';
        };
    }

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    // Obtener ID de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const proveedorId = urlParams.get('id');
    if (!proveedorId) {
        mostrarError('No se especificó qué proveedor editar.', true);
    }

    // ==================== MODALES ====================
    function mostrarExito(mensaje, callback) {
        const modal = document.getElementById('modal-exito');
        document.getElementById('exito-mensaje').innerText = mensaje;
        modal.classList.remove('hidden');
        document.getElementById('btn-cerrar-exito').onclick = () => {
            modal.classList.add('hidden');
            if (callback) callback();
        };
    }

    function mostrarError(mensaje, redirigir = false) {
        const modal = document.getElementById('modal-error');
        document.getElementById('error-mensaje').innerText = mensaje;
        modal.classList.remove('hidden');
        document.getElementById('btn-cerrar-error').onclick = () => {
            modal.classList.add('hidden');
            if (redirigir) window.location.href = 'proveedores.html';
        };
    }

    function mostrarWarning(mensaje) {
        const modal = document.getElementById('modal-warning');
        document.getElementById('warning-mensaje').innerText = mensaje;
        modal.classList.remove('hidden');
        document.getElementById('btn-cerrar-warning').onclick = () => modal.classList.add('hidden');
    }

    // ==================== CARGAR DATOS ====================
    async function cargarProveedor() {
        try {
            const res = await fetch(`${API_BASE}/proveedor/${proveedorId}`, { headers: getHeaders() });
            if (!res.ok) throw new Error(`Error ${res.status}`);
            const proveedor = await res.json();
            document.getElementById('id_proveedor').value = proveedor.id_proveedor;
            document.getElementById('descripcion').value = proveedor.descripcion || '';
            document.getElementById('direccion').value = proveedor.direccion || '';
            document.getElementById('contacto').value = proveedor.contacto || '';
        } catch (error) {
            console.error(error);
            mostrarError('Error al cargar los datos: ' + error.message, true);
        }
    }

    // ==================== ACTUALIZAR PROVEEDOR ====================
    const form = document.getElementById('form-editar');
    const submitBtn = document.getElementById('btn-submit');

    async function actualizarProveedor(event) {
        event.preventDefault();
        
        const descripcion = document.getElementById('descripcion').value.trim();
        const direccion = document.getElementById('direccion').value.trim();
        const contacto = document.getElementById('contacto').value.trim();
        
        if (!descripcion) {
            mostrarWarning('La descripción es obligatoria');
            return;
        }
        
        const datos = {
            descripcion: descripcion,
            direccion: direccion || null,
            contacto: contacto || null
        };
        
        // Guardar texto original y deshabilitar botón
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="material-icons-outlined animate-spin text-xl">progress_activity</span> Actualizando...';
        submitBtn.disabled = true;
        
        try {
            const res = await fetch(`${API_BASE}/proveedor/${proveedorId}`, {
                method: 'PUT',
                headers: getHeaders(),
                body: JSON.stringify(datos)
            });
            
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Error al actualizar');
            }
            
            mostrarExito('Proveedor actualizado correctamente.', () => {
                window.location.href = 'proveedores.html';
            });
        } catch (error) {
            let errorMsg = error.message;
            if (errorMsg.includes('duplicate') || errorMsg.toLowerCase().includes('unique')) {
                errorMsg = 'Ya existe un proveedor con ese nombre.';
            }
            mostrarError('Error al actualizar: ' + errorMsg);
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

    form.addEventListener('submit', actualizarProveedor);
    cargarProveedor();
</script>
</body>
</html>
