<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Gestión de Pedidos - Nonna</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#5D1927",
                    "background-light": "#FEBDC6",
                    "background-dark": "#1a070a",
                },
                fontFamily: {
                    display: ["Playfair Display", "serif"],
                    sans: ["Inter", "sans-serif"],
                },
                borderRadius: { DEFAULT: "0.75rem" },
            },
        },
    };
</script>
<style>
    body { font-family: 'Inter', sans-serif; background-color: #FEBDC6; }
    .font-display { font-family: 'Playfair Display', serif; }
</style>
</head>
<body class="min-h-screen bg-background-light dark:bg-background-dark transition-colors duration-300">
<header class="w-full px-6 py-4 flex justify-between items-center bg-white/50 dark:bg-black/30 backdrop-blur-md sticky top-0 z-50">
    <div class="flex items-center gap-3">
        <div class="bg-primary p-2 rounded-full"><span class="material-icons-round text-white">restaurant</span></div>
        <span class="text-2xl font-display font-bold text-primary dark:text-pink-200">Nonna</span>
    </div>
    <a href="index.html" class="flex items-center gap-2 px-4 py-2 text-primary dark:text-pink-200 hover:bg-primary/10 rounded-full transition-all">
        <span class="material-icons-round">arrow_back</span>
        <span class="font-medium">CRUD's del Sistema</span>
    </a>
</header>
<main class="max-w-7xl mx-auto px-6 py-10">
    <div class="mb-10">
        <h1 class="text-4xl font-display font-bold text-primary dark:text-pink-100 tracking-tight">GESTIÓN DE PEDIDOS</h1>
        <p class="text-primary/70 dark:text-pink-200/60 mt-2">Administra el flujo de pedidos y estados de entrega del sistema.</p>
    </div>
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div class="relative flex-1 max-w-lg">
            <span class="material-icons-round absolute left-3 top-1/2 -translate-y-1/2 text-primary/40">search</span>
            <input id="buscador" class="w-full pl-10 pr-4 py-3 bg-white dark:bg-zinc-900 border-none rounded-xl shadow-sm focus:ring-2 focus:ring-primary dark:text-white placeholder:text-gray-400 transition-all" placeholder="Buscar por ID o nombre del cliente...">
        </div>
        <div class="flex items-center gap-3">
            <a href="pedido_nuevo.html" class="bg-primary hover:bg-opacity-90 text-white px-6 py-3 rounded-xl flex items-center gap-2 shadow-lg shadow-primary/20 transition-all active:scale-95">
                <span class="material-icons-round">add</span>
                <span class="font-semibold">Nuevo Pedido</span>
            </a>
                <span class="material-icons-round hidden dark:block">light_mode</span>
            </button>
        </div>
    </div>
    <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-xl overflow-hidden border border-white/20 dark:border-zinc-800">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 dark:bg-zinc-800/50 border-b border-gray-100 dark:border-zinc-800">
                        <th class="px-6 py-4 text-xs font-bold text-primary dark:text-pink-200 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary dark:text-pink-200 uppercase tracking-wider">Cliente</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary dark:text-pink-200 uppercase tracking-wider">Fecha Entrega</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary dark:text-pink-200 uppercase tracking-wider">Estado</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary dark:text-pink-200 uppercase tracking-wider text-right">Total</th>
                        <th class="px-6 py-4 text-xs font-bold text-primary dark:text-pink-200 uppercase tracking-wider text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-pedidos-body" class="divide-y divide-gray-100 dark:divide-zinc-800">
                    <tr><td colspan="6" class="text-center py-10 text-primary/50">Cargando pedidos...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="px-6 py-4 bg-gray-50 dark:bg-zinc-800/30 border-t border-gray-100 dark:border-zinc-800 flex items-center justify-between">
            <span id="total-registros" class="text-sm text-gray-500 dark:text-zinc-500">Cargando...</span>
            <div class="flex gap-2">
            </div>
        </div>
    </div>
</main>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
    }

    let todosPedidos = [];
    let clientesMap = {};     
    let estadosMap = {};       

    async function cargarClientes() {
        try {
            const res = await fetch(`${API_BASE}/cliente/`, { headers: getHeaders() });
            if (!res.ok) throw new Error();
            const clientes = await res.json();
            clientesMap = {};
            clientes.forEach(c => { clientesMap[c.id_cliente] = `${c.nombre} ${c.apellido}`.trim() || `Cliente ${c.id_cliente}`; });
        } catch(e) { console.error('Error cargando clientes', e); }
    }

    async function cargarEstados() {
        estadosMap = { 1: 'Pendiente', 2: 'Preparación', 3: 'Enviado', 4: 'Entregado', 5: 'Cancelado' };
    }

    async function listarPedidos() {
        const res = await fetch(`${API_BASE}/pedidos/`, { headers: getHeaders() });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    function renderizarPedidos(pedidos) {
        const tbody = document.getElementById('tabla-pedidos-body');
        if (!pedidos.length) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-primary/50">No hay pedidos. ¡Crea el primero!</td></tr>`;
            document.getElementById('total-registros').innerText = 'Mostrando 0 pedidos';
            return;
        }
        tbody.innerHTML = '';
        pedidos.forEach(ped => {
            const id = ped.id_pedido;
            const clienteNombre = clientesMap[ped.id_cliente] || `Cliente ${ped.id_cliente}`;
            const fechaEntrega = ped.fecha_entrega ? new Date(ped.fecha_entrega).toLocaleDateString() : 'Sin fecha';
            const estadoTexto = estadosMap[ped.id_estado] || 'Desconocido';
            const total = ped.total ? `$${parseFloat(ped.total).toFixed(2)}` : '$0.00';
            const estadoColor = ped.id_estado === 1 ? 'bg-amber-100 text-amber-700' : (ped.id_estado === 4 ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700');
            const fila = `
                <tr class="hover:bg-gray-50 dark:hover:bg-zinc-800/30 transition-colors">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 dark:text-zinc-100">#${id}</td>
                    <td class="px-6 py-4 whitespace-nowrap"><div class="flex items-center"><div class="h-8 w-8 rounded-full bg-pink-100 dark:bg-zinc-800 flex items-center justify-center text-primary dark:text-pink-200 mr-3 text-xs font-bold">${clienteNombre.charAt(0)}</div><span class="text-sm text-gray-700 dark:text-zinc-300">${escapeHtml(clienteNombre)}</span></div></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 dark:text-zinc-400">${escapeHtml(fechaEntrega)}</td>
                    <td class="px-6 py-4 whitespace-nowrap"><span class="px-3 py-1 text-xs font-semibold rounded-full ${estadoColor}">${escapeHtml(estadoTexto)}</span></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900 dark:text-zinc-100 text-right">${total}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-center"><div class="flex justify-center gap-2">
                        <a href="pedido_ver.html?id=${id}" class="p-2 text-primary hover:bg-primary/10 rounded-lg transition-colors" title="Ver Detalles"><span class="material-icons-round text-xl">visibility</span></a>
                        <a href="pedido_editar.html?id=${id}" class="p-2 text-primary hover:bg-primary/10 rounded-lg transition-colors" title="Editar"><span class="material-icons-round text-xl">edit</span></a>
                        <a href="pedido_eliminar.html?id=${id}" class="p-2 text-primary hover:bg-primary/10 rounded-lg transition-colors" title="Eliminar"><span class="material-icons-round text-xl text-red-600 dark:text-red-400">delete</span></a>
                    </div></td>
                </tr>`;
            tbody.insertAdjacentHTML('beforeend', fila);
        });
        document.getElementById('total-registros').innerText = `Mostrando ${pedidos.length} pedidos`;
    }

    async function cargarPedidos() {
        const tbody = document.getElementById('tabla-pedidos-body');
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10">Cargando...</td></tr>`;
        try {
            await Promise.all([cargarClientes(), cargarEstados()]);
            todosPedidos = await listarPedidos();
            renderizarPedidos(todosPedidos);
        } catch (error) {
            let mensaje = error.message.includes('401') ? 'Token inválido. Actualiza TOKEN.' : (error.message.includes('Failed to fetch') ? 'Error de CORS o conexión.' : error.message);
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-10 text-red-500">Error: ${mensaje}</td></tr>`;
        }
    }

    const buscador = document.getElementById('buscador');
    if (buscador) {
        buscador.addEventListener('input', (e) => {
            const texto = e.target.value.toLowerCase();
            if (!texto.trim()) return renderizarPedidos(todosPedidos);
            const filtrados = todosPedidos.filter(p => p.id_pedido.toString().includes(texto) || (clientesMap[p.id_cliente] || '').toLowerCase().includes(texto));
            renderizarPedidos(filtrados);
        });
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    cargarPedidos();
</script>
</body>
</html>
