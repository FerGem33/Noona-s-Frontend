<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#5d1926",
                    "accent-pink": "#FEBDC6",
                    "background-light": "#f8f6f6",
                    "background-dark": "#1f1315",
                },
                fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    /* Estilos para notificaciones toast */
    .toast-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        min-width: 280px;
        max-width: 380px;
        background: white;
        border-radius: 0.75rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        padding: 1rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        transform: translateX(400px);
        transition: transform 0.3s ease-out;
        border-left: 4px solid;
        pointer-events: auto;
    }
    .toast-notification.show {
        transform: translateX(0);
    }
    .toast-notification.success {
        border-left-color: #10b981;
    }
    .toast-notification.error {
        border-left-color: #ef4444;
    }
    .toast-notification.warning {
        border-left-color: #f59e0b;
    }
    .toast-notification.info {
        border-left-color: #3b82f6;
    }
    .toast-icon {
        flex-shrink: 0;
    }
    .toast-content {
        flex: 1;
        font-size: 0.875rem;
        line-height: 1.4;
    }
    .toast-close {
        cursor: pointer;
        color: #9ca3af;
        transition: color 0.2s;
    }
    .toast-close:hover {
        color: #4b5563;
    }
</style>
<title>Editar Rol - Nonna DB</title>
</head>
<body class="font-display bg-accent-pink min-h-screen flex flex-col">
<main class="flex-1 flex items-center justify-center p-6 sm:p-12">
    <div class="w-full max-w-[560px] bg-white rounded-xl shadow-2xl p-8 md:p-12">
        <div class="mb-10 text-center">
            <span class="material-symbols-outlined text-primary text-5xl mb-4"></span>
            <h1 class="text-primary text-3xl font-black leading-tight tracking-[-0.033em] uppercase">Editar Rol</h1>
            <p class="text-slate-500 text-base font-normal mt-2">Gestión de privilegios de acceso al sistema</p>
        </div>
        <form id="form-editar" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-primary text-sm font-bold leading-normal uppercase tracking-wider">Descripción del Rol</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-primary/60">
                        <span class="material-symbols-outlined text-lg"></span>
                    </span>
                    <input id="descripcion" class="form-input block w-full pl-11 rounded-lg border-slate-200 text-slate-900 focus:border-primary focus:ring-primary/20 h-14 text-base font-normal transition-all" placeholder="Ej. Administrador" required>
                </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-4 pt-6">
                <button type="submit" id="btn-submit" class="flex-1 flex min-w-[140px] cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-lg h-14 px-6 bg-primary text-white text-base font-bold transition-all hover:bg-primary/90 hover:shadow-lg active:scale-95">
                    <span class="material-symbols-outlined text-lg"></span>
                    <span>Guardar Cambios</span>
                </button>
                <a href="roles.html" class="flex-1 flex min-w-[140px] cursor-pointer items-center justify-center gap-2 overflow-hidden rounded-lg h-14 px-6 bg-white border-2 border-primary text-primary text-base font-bold transition-all hover:bg-primary/5 active:scale-95">
                    <span class="material-symbols-outlined text-lg"></span>
                    <span>Cancelar</span>
                </a>
            </div>
        </form>
    </div>
</main>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    // ---------- SISTEMA DE NOTIFICACIONES TOAST ----------
    function showToast(message, type = 'info', duration = 4000) {
        const toastContainer = document.getElementById('toast-container') || (() => {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.style.position = 'fixed';
            container.style.top = '20px';
            container.style.right = '20px';
            container.style.zIndex = '1000';
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '10px';
            document.body.appendChild(container);
            return container;
        })();

        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        
        let icon = '';
        if (type === 'success') icon = '';
        else if (type === 'error') icon = 'error';
        else if (type === 'warning') icon = 'warning';
        else icon = 'info';
        
        toast.innerHTML = `
            <div class="toast-icon">
                <span class="material-symbols-outlined" style="color: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6'}">${icon}</span>
            </div>
            <div class="toast-content">${message}</div>
            <div class="toast-close">
                <span class="material-symbols-outlined text-sm"></span>
            </div>
        `;
        
        toastContainer.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        
        toast.querySelector('.toast-close').addEventListener('click', () => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        });
        
        setTimeout(() => {
            if (toast.parentNode) {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }
        }, duration);
    }

    // Obtener ID del rol desde la URL
    const urlParams = new URLSearchParams(window.location.search);
    const rolId = urlParams.get('id');
    if (!rolId) {
        showToast('No se especificó qué rol editar.', 'error');
        setTimeout(() => { window.location.href = 'roles.html'; }, 1500);
    }

    // Cargar datos del rol
    async function cargarRol() {
        try {
            const res = await fetch(`${API_BASE}/rol/${rolId}`, { headers: getHeaders() });
            if (!res.ok) throw new Error(`Error ${res.status}`);
            const rol = await res.json();
            document.getElementById('descripcion').value = rol.descripcion || '';
        } catch (error) {
            console.error(error);
            showToast('Error al cargar el rol: ' + error.message, 'error');
            setTimeout(() => { window.location.href = 'roles.html'; }, 2000);
        }
    }

    // Actualizar rol
    async function actualizarRol(event) {
        event.preventDefault();
        
        const descripcion = document.getElementById('descripcion').value.trim();
        if (!descripcion) {
            showToast('La descripción del rol es obligatoria.', 'warning');
            document.getElementById('descripcion').focus();
            return;
        }
        
        const submitBtn = document.getElementById('btn-submit');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-lg"></span> Guardando...';
        submitBtn.disabled = true;
        
        try {
            const res = await fetch(`${API_BASE}/rol/${rolId}`, {
                method: 'PUT',
                headers: getHeaders(),
                body: JSON.stringify({ descripcion })
            });
            
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Error al actualizar el rol');
            }
            
            showToast(`Rol "${descripcion}" actualizado correctamente.`, 'success');
            setTimeout(() => {
                window.location.href = 'roles.html';
            }, 1500);
        } catch (error) {
            let errorMsg = error.message;
            if (errorMsg.includes('duplicate') || errorMsg.toLowerCase().includes('unique')) {
                errorMsg = 'Ya existe un rol con esa descripción. Elija otro nombre.';
            }
            showToast(`Error: ${errorMsg}`, 'error');
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    }

    document.getElementById('form-editar').addEventListener('submit', actualizarRol);
    cargarRol();
</script>
</body>
</html>
