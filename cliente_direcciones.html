<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Direcciones del Cliente - Nonna</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { primary: "#5D1927", "background-light": "#FEBDC6", "background-dark": "#2D0A11" },
                fontFamily: { display: ["Inter", "sans-serif"] },
                borderRadius: { DEFAULT: "0.75rem" },
            },
        },
    };
</script>
<style>
    .toast-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        min-width: 280px;
        max-width: 380px;
        background: white;
        border-radius: 0.75rem;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        padding: 1rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        transform: translateX(400px);
        transition: transform 0.3s ease-out;
        border-left: 4px solid;
        pointer-events: auto;
    }
    .toast-notification.show { transform: translateX(0); }
    .toast-notification.success { border-left-color: #10b981; }
    .toast-notification.error { border-left-color: #ef4444; }
    .toast-notification.warning { border-left-color: #f59e0b; }
    .toast-icon { flex-shrink: 0; }
    .toast-content { flex: 1; font-size: 0.875rem; line-height: 1.4; }
    .toast-close { cursor: pointer; color: #9ca3af; transition: color 0.2s; }
    .toast-close:hover { color: #4b5563; }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark font-sans min-h-screen">
<header class="w-full py-4 px-6 lg:px-12 flex justify-between items-center bg-white/30 dark:bg-black/20 backdrop-blur-md sticky top-0 z-50 border-b border-primary/10">
    <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-primary rounded-full flex items-center justify-center text-white shadow-lg">
            <span class="material-icons-outlined">restaurant</span>
        </div>
        <span class="text-2xl font-bold text-primary dark:text-white">Nonna</span>
    </div>
    <a href="clientes.html" class="flex items-center gap-2 px-4 py-2 text-primary dark:text-pink-200 hover:bg-white/40 dark:hover:bg-white/10 rounded-full transition-all font-medium">
        <span class="material-icons-outlined text-sm">arrow_back</span>
        Volver a clientes
    </a>
</header>
<main class="max-w-4xl mx-auto px-6 lg:px-12 py-10">
    <div class="mb-6">
        <h1 class="text-3xl font-bold text-primary">Direcciones del Cliente</h1>
        <p id="cliente-nombre" class="text-primary/70 mt-1">Cargando...</p>
    </div>
    <div class="bg-white dark:bg-neutral-900/80 rounded-2xl shadow-xl p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-slate-800 dark:text-white">Lista de Direcciones</h2>
            <button id="btn-agregar" class="bg-primary text-white px-4 py-2 rounded-lg flex items-center gap-2 hover:bg-primary/90">
                <span class="material-icons-outlined">add</span> Nueva Dirección
            </button>
        </div>
        <div id="lista-direcciones" class="space-y-4">
            <p class="text-slate-500">Cargando direcciones...</p>
        </div>
    </div>
</main>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;
    if (!TOKEN) {
        alert('⚠️ No hay token de autenticación. Redirigiendo al login.');
        window.location.href = 'index.html';
    }

    function getHeaders() {
        return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
    }

    // ---------- SISTEMA DE TOAST ----------
    function showToast(message, type = 'info', duration = 4000) {
        const toastContainer = document.getElementById('toast-container') || (() => {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.style.cssText = 'position:fixed; top:20px; right:20px; z-index:1000; display:flex; flex-direction:column; gap:10px;';
            document.body.appendChild(container);
            return container;
        })();

        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        let icon = '';
        if (type === 'success') icon = 'check_circle';
        else if (type === 'error') icon = 'error';
        else if (type === 'warning') icon = 'warning';
        else icon = 'info';
        const iconColor = type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : (type === 'warning' ? '#f59e0b' : '#3b82f6'));
        toast.innerHTML = `
            <div class="toast-icon"><span class="material-icons-outlined" style="color:${iconColor}">${icon}</span></div>
            <div class="toast-content">${message}</div>
            <div class="toast-close"><span class="material-icons-outlined text-sm">close</span></div>
        `;
        toastContainer.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 10);
        toast.querySelector('.toast-close').onclick = () => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        };
        setTimeout(() => {
            if (toast.parentNode) {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }
        }, duration);
    }

    // ---------- MODAL DE CONFIRMACIÓN ----------
    function showConfirmModal(message, onConfirm) {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-[1050] backdrop-blur-sm';
        modalDiv.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl border-t-4 border-primary">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-primary/10 p-2 rounded-full">
                        <span class="material-icons-outlined text-primary">warning</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 dark:text-white">Confirmar eliminación</h3>
                </div>
                <p class="text-slate-600 dark:text-slate-300 mb-6">${message}</p>
                <div class="flex justify-end gap-3">
                    <button id="confirm-cancel" class="px-4 py-2 border border-slate-300 dark:border-slate-600 rounded-lg text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 transition">Cancelar</button>
                    <button id="confirm-ok" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">Eliminar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#confirm-cancel').onclick = () => modalDiv.remove();
        modalDiv.querySelector('#confirm-ok').onclick = () => {
            modalDiv.remove();
            onConfirm();
        };
    }

    // ---------- PARÁMETROS ----------
    const urlParams = new URLSearchParams(window.location.search);
    const clienteId = urlParams.get('id');
    if (!clienteId) {
        showToast('No se especificó qué cliente.', 'error');
        setTimeout(() => { window.location.href = 'clientes.html'; }, 1500);
    }

    let clienteNombre = '';

    // ---------- CARGAR CLIENTE ----------
    async function cargarCliente() {
        try {
            const res = await fetch(`${API_BASE}/cliente/${clienteId}`, { headers: getHeaders() });
            if (res.ok) {
                const cliente = await res.json();
                clienteNombre = `${cliente.nombre || ''} ${cliente.apellido || ''}`.trim() || 'Cliente';
                document.getElementById('cliente-nombre').innerText = clienteNombre;
            } else {
                document.getElementById('cliente-nombre').innerText = 'Cliente no encontrado';
            }
        } catch(e) { 
            console.error(e); 
            document.getElementById('cliente-nombre').innerText = 'Error al cargar cliente';
        }
    }

    // ---------- CARGAR DIRECCIONES (VERSIÓN CORREGIDA) ----------
    async function cargarDirecciones() {
        const container = document.getElementById('lista-direcciones');
        container.innerHTML = '<p class="text-slate-500">Cargando direcciones...</p>';
        try {
            const res = await fetch(`${API_BASE}/direccion/`, { headers: getHeaders() });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const todas = await res.json();
            console.log('Todas las direcciones:', todas); // Para depuración
            
            // Convertir clienteId a número
            const idClienteNum = parseInt(clienteId);
            const misDirecciones = todas.filter(d => d.id_cliente === idClienteNum);
            console.log('Direcciones del cliente:', misDirecciones);
            
            if (misDirecciones.length === 0) {
                container.innerHTML = '<p class="text-slate-500">No hay direcciones registradas para este cliente.</p>';
                return;
            }
            container.innerHTML = '';
            misDirecciones.forEach(dir => {
                // Mostrar descripción o un mensaje si está vacía
                const descripcion = dir.descripcion && dir.descripcion.trim() !== '' 
                    ? dir.descripcion 
                    : '<span class="text-red-500">[Dirección sin descripción]</span>';
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-4 bg-slate-50 dark:bg-slate-800 rounded-xl border border-primary/10';
                div.innerHTML = `
                    <div>
                        <p class="font-semibold text-slate-800 dark:text-white">${descripcion}</p>
                        <p class="text-xs text-slate-500">ID: ${dir.id_direccion}</p>
                    </div>
                    <button class="eliminar-direccion text-red-500 hover:bg-red-50 p-2 rounded-full" data-id="${dir.id_direccion}">
                        <span class="material-icons-outlined">delete</span>
                    </button>
                `;
                container.appendChild(div);
            });
            // Asignar eventos de eliminación
            document.querySelectorAll('.eliminar-direccion').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const idDir = btn.dataset.id;
                    showConfirmModal('¿Estás seguro de eliminar esta dirección? Esta acción no se puede deshacer.', async () => {
                        try {
                            const delRes = await fetch(`${API_BASE}/direccion/${idDir}`, { method: 'DELETE', headers: getHeaders() });
                            if (!delRes.ok) {
                                const errData = await delRes.json();
                                throw new Error(errData.detail || 'Error al eliminar');
                            }
                            showToast('Dirección eliminada correctamente', 'success');
                            cargarDirecciones(); // recargar lista
                        } catch(e) {
                            showToast('Error al eliminar dirección: ' + e.message, 'error');
                        }
                    });
                });
            });
        } catch(e) {
            console.error('Error en cargarDirecciones:', e);
            container.innerHTML = `<p class="text-red-500">Error al cargar direcciones: ${e.message}</p>`;
            showToast('Error al cargar direcciones', 'error');
        }
    }

    // ---------- MODAL AGREGAR DIRECCIÓN ----------
    function mostrarModalAgregar() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'fixed inset-0 bg-black/50 flex items-center justify-center z-50';
        modalDiv.innerHTML = `
            <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-md">
                <h3 class="text-xl font-bold mb-4">Nueva Dirección</h3>
                <textarea id="nueva-descripcion" class="w-full border rounded-xl p-3" rows="3" placeholder="Calle, número, colonia, ciudad, CP..."></textarea>
                <div class="flex justify-end gap-3 mt-6">
                    <button id="cancelar-modal" class="px-4 py-2 border rounded-xl">Cancelar</button>
                    <button id="confirmar-modal" class="px-4 py-2 bg-primary text-white rounded-xl">Guardar</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#cancelar-modal').onclick = () => modalDiv.remove();
        modalDiv.querySelector('#confirmar-modal').onclick = async () => {
            const descripcion = modalDiv.querySelector('#nueva-descripcion').value.trim();
            if (!descripcion) {
                showToast('La dirección es obligatoria', 'warning');
                return;
            }
            const confirmBtn = modalDiv.querySelector('#confirmar-modal');
            const originalText = confirmBtn.innerText;
            confirmBtn.innerText = 'Guardando...';
            confirmBtn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/direccion/`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ id_cliente: parseInt(clienteId), descripcion })
                });
                if (!res.ok) {
                    const errData = await res.json();
                    throw new Error(errData.detail || 'Error al guardar');
                }
                showToast('Dirección agregada correctamente', 'success');
                modalDiv.remove();
                cargarDirecciones(); // recargar lista
            } catch(e) {
                showToast('Error al guardar dirección: ' + e.message, 'error');
                confirmBtn.innerText = originalText;
                confirmBtn.disabled = false;
            }
        };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // EVENTOS
    document.getElementById('btn-agregar').addEventListener('click', mostrarModalAgregar);

    cargarCliente();
    cargarDirecciones();
</script>
</body>
</html>
