<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: { "primary": "#ec1325", "background-light": "#f8f6f6", "background-dark": "#221012" },
                fontFamily: { "display": ["Plus Jakarta Sans"] },
                borderRadius: {"DEFAULT": "0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
            },
        },
    }
</script>
<title>Eliminar Pedido - Nonna</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-[2px] z-40"></div>
<div class="fixed inset-0 flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-background-dark w-full max-w-md rounded-xl shadow-2xl border border-primary/20 overflow-hidden">
        <div class="p-8 text-center">
            <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-primary/10 mb-6"><span class="material-symbols-outlined text-primary text-4xl">warning</span></div>
            <h3 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">¿Eliminar este pedido?</h3>
            <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed mb-8">Al eliminar el pedido se borrará todo el historial relacionado de forma permanente. Esta acción no se puede deshacer.</p>
            <div class="bg-primary/5 rounded-lg p-4 mb-8 text-left border border-primary/10">
                <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold uppercase tracking-wider text-primary/60">ID del Pedido</span><span id="pedido-id" class="text-sm font-bold text-slate-900 dark:text-slate-100">-</span></div>
                <div class="flex justify-between items-center"><span class="text-xs font-bold uppercase tracking-wider text-primary/60">Cliente</span><span id="cliente-nombre" class="text-sm font-medium text-slate-900 dark:text-slate-100">-</span></div>
            </div>
            <div class="flex flex-col gap-3">
                <button id="btn-eliminar" class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg transition-all shadow-lg shadow-primary/20">Confirmar Eliminación</button>
                <a href="pedidos.html" class="w-full bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold py-3.5 px-4 rounded-lg transition-all">Mantener Pedido</a>
            </div>
        </div>
        <div class="bg-primary/5 py-3 px-8 text-center border-t border-primary/10"><p class="text-[10px] text-primary/40 uppercase font-bold tracking-[0.2em]">Nonna Administrative Module</p></div>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;
    function getHeaders() { return { 'accept': 'application/json', 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }; }

    const urlParams = new URLSearchParams(window.location.search);
    const pedidoId = urlParams.get('id');
    if (!pedidoId) { alert('No se especificó pedido'); window.location.href='pedidos.html'; }

    async function cargarDatos() {
        try {
            const res = await fetch(`${API_BASE}/pedidos/${pedidoId}`, { headers: getHeaders() });
            if (!res.ok) throw new Error();
            const pedido = await res.json();
            document.getElementById('pedido-id').innerText = pedido.id_pedido;
            const clienteRes = await fetch(`${API_BASE}/cliente/${pedido.id_cliente}`, { headers: getHeaders() });
            if (clienteRes.ok) {
                const cliente = await clienteRes.json();
                document.getElementById('cliente-nombre').innerText = `${cliente.nombre} ${cliente.apellido}`.trim();
            } else {
                document.getElementById('cliente-nombre').innerText = `Cliente ${pedido.id_cliente}`;
            }
        } catch(e) {
            document.getElementById('cliente-nombre').innerText = 'Error al cargar';
        }
    }

    async function eliminarPedido() {
        try {
            const res = await fetch(`${API_BASE}/pedidos/${pedidoId}`, { method: 'DELETE', headers: getHeaders() });
            if (!res.ok) throw new Error((await res.json()).detail || 'Error');
            alert('Pedido eliminado correctamente');
            window.location.href = 'pedidos.html';
        } catch(e) { alert('Error: ' + e.message); }
    }

    document.getElementById('btn-eliminar').addEventListener('click', () => { if (confirm('¿Estás seguro? Esta acción es irreversible.')) eliminarPedido(); });
    cargarDatos();
</script>
</body>
</html>
