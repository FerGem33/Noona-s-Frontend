<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400,100,700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#5d1926",
                    "brand-pink": "#FEBDC6",
                    "background-light": "#f8f6f6",
                    "background-dark": "#1f1315",
                },
                fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    /* Estilos para las notificaciones toast */
    .toast-notification {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        min-width: 280px;
        max-width: 380px;
        background: white;
        border-radius: 0.75rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
        padding: 1rem;
        margin-bottom: 1rem;
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        transform: translateX(400px);
        transition: transform 0.3s ease-out;
        border-left: 4px solid;
        pointer-events: auto;
    }
    .toast-notification.show {
        transform: translateX(0);
    }
    .toast-notification.success {
        border-left-color: #10b981;
    }
    .toast-notification.error {
        border-left-color: #ef4444;
    }
    .toast-notification.warning {
        border-left-color: #f59e0b;
    }
    .toast-notification.info {
        border-left-color: #3b82f6;
    }
    .toast-icon {
        flex-shrink: 0;
    }
    .toast-content {
        flex: 1;
        font-size: 0.875rem;
        line-height: 1.4;
    }
    .toast-close {
        cursor: pointer;
        color: #9ca3af;
        transition: color 0.2s;
    }
    .toast-close:hover {
        color: #4b5563;
    }
</style>
<title>Registro de Nuevo Rol - Nonna DB</title>
</head>
<body class="font-display bg-brand-pink min-h-screen flex flex-col">
<header class="bg-white/90 backdrop-blur-sm border-b border-primary/10 px-6 py-4 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="bg-primary p-1.5 rounded-lg">
                <span class="material-symbols-outlined textworks-white text-2xl"></span>
            </div>
            <h1 class="text-primary text-xl font-bold tracking-tight">Nonna <span class="font-light text-primary/70">Admin</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <a href="roles.html" class="flex items-center gap-2 px-4 py-2 text-primary font-semibold hover:bg-primary/5 rounded-lg transition-colors border border-primary/20">
                <span class="material-symbols-outlined text-lg"></span>
                <span>Regresar</span>
            </a>
            <div class="w-10 h-10 rounded-full border-2 border-primary/20 overflow-hidden bg-primary/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary"></span>
            </div>
        </div>
    </div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-12">
    <div class="max-w-[560px] w-full">
        <div class="bg-white rounded-xl shadow-xl overflow-hidden border border-white/20">
            <div class="h-32 bg-primary flex flex-col items-center justify-center relative overflow-hidden" style="background-image: linear-gradient(135deg, #5d1926 0%, #8b2a3a 100%);">
                <div class="absolute inset-0 opacity-10">
                    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                        <defs><pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="white"></circle></pattern></defs>
                        <rect width="100%" height="100%" fill="url(#dots)"></rect>
                    </svg>
                </div>
                <span class="material-symbols-outlined text-white/30 text-6xl absolute -bottom-4 -right-4 rotate-12"></span>
            </div>
            <div class="p-8">
                <div class="mb-8 text-center">
                    <h2 class="text-primary text-2xl font-bold tracking-tight uppercase mb-2">Registrar Nuevo Rol</h2>
                    <p class="text-slate-500 text-sm">Configure los permisos del sistema creando un nuevo rol administrativo.</p>
                </div>
                <form id="form-rol" class="space-y-6">
                    <div class="flex flex-col gap-2">
                        <label class="text-primary font-bold text-sm uppercase tracking-wider flex items-center gap-2">
                            <span class="material-symbols-outlined text-lg"></span>
                            Descripción del Rol
                        </label>
                        <input id="descripcion" class="w-full border border-primary/20 rounded-lg px-4 py-3.5 text-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" placeholder="Ej. Administrador, Repartidor, Cajero..." required>
                    </div>
                    <div class="bg-primary/5 rounded-lg p-4 border border-primary/10 flex gap-3">
                        <span class="material-symbols-outlined text-primary shrink-0"></span>
                        <p class="text-xs text-primary/80 leading-relaxed">El ID del rol será generado automáticamente por el sistema al guardar la información en la base de datos de Nonna.</p>
                    </div>
                    <div class="flex flex-col sm:flex-row gap-3 pt-4">
                        <button type="submit" id="btn-submit" class="flex-1 bg-primary text-white font-bold py-3.5 rounded-lg hover:bg-primary/90 transition-all shadow-md active:scale-[0.98] flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined"></span>
                            Guardar Rol
                        </button>
                        <a href="roles.html" class="flex-1 bg-white text-primary border-2 border-primary font-bold py-3.5 rounded-lg hover:bg-primary/5 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined"></span>
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    // ---------- SISTEMA DE NOTIFICACIONES TOAST ----------
    function showToast(message, type = 'info', duration = 4000) {
        const toastContainer = document.getElementById('toast-container') || (() => {
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.style.position = 'fixed';
            container.style.top = '20px';
            container.style.right = '20px';
            container.style.zIndex = '1000';
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '10px';
            document.body.appendChild(container);
            return container;
        })();

        const toast = document.createElement('div');
        toast.className = `toast-notification ${type}`;
        
        let icon = '';
        if (type === 'success') icon = '';
        else if (type === 'error') icon = 'error';
        else if (type === 'warning') icon = 'warning';
        else icon = 'info';
        
        toast.innerHTML = `
            <div class="toast-icon">
                <span class="material-symbols-outlined" style="color: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6'}">${icon}</span>
            </div>
            <div class="toast-content">${message}</div>
            <div class="toast-close">
                <span class="material-symbols-outlined text-sm"></span>
            </div>
        `;
        
        toastContainer.appendChild(toast);
        
        setTimeout(() => toast.classList.add('show'), 10);
        
        toast.querySelector('.toast-close').addEventListener('click', () => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        });
        
        setTimeout(() => {
            if (toast.parentNode) {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }
        }, duration);
    }

    // ---------- CREAR ROL ----------
    async function crearRol(datos) {
        const res = await fetch(`${API_BASE}/rol/`, {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify(datos)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Error al crear rol');
        }
        return res.json();
    }

    // ---------- ENVÍO DEL FORMULARIO ----------
    const form = document.getElementById('form-rol');
    const submitBtn = document.getElementById('btn-submit');
    let isSubmitting = false;

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (isSubmitting) return;
        
        const descripcion = document.getElementById('descripcion').value.trim();
        
        if (!descripcion) {
            showToast('La descripción del rol es obligatoria.', 'warning');
            document.getElementById('descripcion').focus();
            return;
        }
        
        isSubmitting = true;
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin"></span> Guardando...';
        submitBtn.disabled = true;
        
        try {
            await crearRol({ descripcion });
            showToast(`Rol "${descripcion}" creado correctamente.`, 'success');
            setTimeout(() => {
                window.location.href = 'roles.html';
            }, 1500);
        } catch (error) {
            let errorMsg = error.message;
            if (errorMsg.includes('duplicate') || errorMsg.toLowerCase().includes('unique')) {
                errorMsg = 'Ya existe un rol con esa descripción. Elija otro nombre.';
            }
            showToast(`Error: ${errorMsg}`, 'error');
            isSubmitting = false;
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });
</script>
</body>
</html>
