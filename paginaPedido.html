<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Detalle de Pedido · Noonas Pastelería</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Estilos adicionales usando las variables de styles.css */
    .pedido-container {
      max-width: 700px;
      margin: 2rem auto;
      background: #ffffff;
      padding: 2rem;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(35, 15, 18, 0.08);
      border: 1px solid var(--primary);
    }
    .pedido-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px dashed var(--primary);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }
    .pedido-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--bg-dark);
      margin: 0;
    }
    .badge-estado {
      background: var(--primary);
      color: var(--bg-dark);
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .detalle-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.8rem 1.5rem;
      margin: 1.5rem 0;
    }
    .detalle-label {
      font-weight: 600;
      color: var(--bg-dark);
      opacity: 0.8;
    }
    .detalle-valor {
      color: #3e2c1e;
    }
    .total-box {
      background: rgba(254, 189, 198, 0.15);
      padding: 1.2rem;
      border-radius: 20px;
      text-align: right;
      margin-top: 1.5rem;
      border: 1px solid var(--primary);
    }
    .total-box .total-label {
      font-size: 1.1rem;
      color: var(--bg-dark);
    }
    .total-box .total-num {
      font-size: 2rem;
      font-weight: 700;
      color: var(--bg-dark);
    }
    .btn-volver {
      display: inline-block;
      background: var(--primary);
      color: var(--bg-dark);
      padding: 0.8rem 1.8rem;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      margin-top: 1.5rem;
      transition: opacity 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn-volver:hover {
      opacity: 0.8;
    }
    .loading, .error-message {
      text-align: center;
      padding: 3rem;
      font-size: 1.2rem;
      color: var(--bg-dark);
    }
    .comentario-box {
      background: rgba(254, 189, 198, 0.1);
      padding: 1rem;
      border-radius: 16px;
      margin: 1rem 0;
      border-left: 6px solid var(--primary);
      color: var(--bg-dark);
    }
    .comentario-box strong {
      color: var(--bg-dark);
    }
  </style>
</head>
<body>

<header>
  <a href="index.html">
    <img src="assests/logoNoonas.jpg" alt="Logo Noonas" class="logo" onerror="this.src='https://placehold.co/200x200?text=Noonas'">
  </a>
  <div class="header-center">
    <h1>Noonas</h1>
    <p class="tagline">Hecho con Amor</p>
  </div>
  <div class="header-search" style="visibility: hidden;"></div>
</header>

<nav>
  <a href="index.html#pasteles">Pasteles</a>
  <a href="index.html#contacto">Contacto</a>
</nav>

<main>
  <div id="pedidoDetailContainer" class="pedido-container">
    <div class="loading">🍰 Cargando detalles del pedido...</div>
  </div>
</main>

<footer>
  <p>© 2026 Noonas Pastelería · Hecho con 🩷 · Productos frescos todos los días</p>
</footer>

<script>
  (function() {
    const API_BASE_URL = 'http://3.15.13.161:8000';
    
    function getAuthToken() {
      return localStorage.getItem('token');
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
    
    function formatearFecha(isoString) {
      if (!isoString) return 'No especificada';
      try {
        const fecha = new Date(isoString);
        return fecha.toLocaleDateString('es-MX', {
          year: 'numeric', month: 'long', day: 'numeric'
        });
      } catch (e) {
        return isoString;
      }
    }
    
    function formatearMoneda(valor) {
      const num = parseFloat(valor);
      return isNaN(num) ? '$0.00' : `$${num.toFixed(2)}`;
    }
    
    async function cargarDetallePedido() {
      const container = document.getElementById('pedidoDetailContainer');
      const params = new URLSearchParams(window.location.search);
      const idPedido = params.get('id');
      
      if (!idPedido) {
        container.innerHTML = `<div class="error-message">❌ No se especificó un número de pedido.</div>
                               <a href="index.html" class="btn-volver">← Volver al inicio</a>`;
        return;
      }
      
      const token = getAuthToken();
      if (!token) {
        container.innerHTML = `<div class="error-message">🔐 No hay token de autenticación. <br> Por favor inicia sesión para ver tus pedidos.</div>
                               <a href="index.html" class="btn-volver">← Volver</a>`;
        return;
      }
      
      container.innerHTML = `<div class="loading">🔎 Buscando pedido #${escapeHtml(idPedido)}...</div>`;
      
      try {
        const response = await fetch(`${API_BASE_URL}/api/pedidos/${encodeURIComponent(idPedido)}`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/json'
          }
        });
        
        if (!response.ok) {
          if (response.status === 404) {
            throw new Error(`El pedido #${idPedido} no fue encontrado.`);
          } else if (response.status === 401 || response.status === 403) {
            throw new Error('No tienes permiso para ver este pedido. Verifica tu sesión.');
          } else {
            let errMsg = `Error ${response.status}`;
            try { const e = await response.json(); errMsg = e.detail || e.message || errMsg; } catch(e){}
            throw new Error(errMsg);
          }
        }
        
        const pedido = await response.json();
        renderizarPedido(pedido, container, idPedido);
        
      } catch (error) {
        console.error('Error al obtener pedido:', error);
        container.innerHTML = `<div class="error-message">❌ ${escapeHtml(error.message)}</div>
                               <a href="index.html" class="btn-volver">← Volver al inicio</a>`;
      }
    }
    
    function renderizarPedido(pedido, container, idPedido) {
      // Mapeo de estados (ajusta según tu API)
      const estados = {
        2: 'Pendiente',
        3: 'En preparación',
        5: 'Entregado',
        6: 'Cancelado'
      };
      const estadoTexto = estados[pedido.id_estado] || `Estado #${pedido.id_estado}`;
      const tipoEntregaTexto = pedido.tipo_entrega ? '🏠 A domicilio' : '🏪 Recoger en tienda';
      
      // --- NUEVO: Obtener nombre del cliente y dirección desde objetos anidados ---
      let nombreCliente = '—';
      if (pedido.cliente) {
        // Prueba con distintos posibles nombres de campo
        nombreCliente = pedido.cliente.nombre || pedido.cliente.nombre_completo || 
                        `${pedido.cliente.nombres || ''} ${pedido.cliente.apellidos || ''}`.trim() ||
                        `Cliente #${pedido.id_cliente}`;
      } else {
        nombreCliente = `Cliente #${pedido.id_cliente}`;
      }
      
      let direccionCompleta = '—';
      if (pedido.direccion) {
        const dir = pedido.direccion;
        direccionCompleta = `${dir.calle || ''} ${dir.numero || ''}, ${dir.colonia || ''}, ${dir.ciudad || ''}, ${dir.cp || ''}`.replace(/^,|,$/g, '').trim();
        if (!direccionCompleta) direccionCompleta = `Dirección #${pedido.id_direccion}`;
      } else {
        direccionCompleta = `Dirección #${pedido.id_direccion}`;
      }
      
      const html = `
        <div class="pedido-header">
          <h2>Pedido #${escapeHtml(idPedido)}</h2>
          <span class="badge-estado">${escapeHtml(estadoTexto)}</span>
        </div>
        
        <div class="detalle-grid">
          <span class="detalle-label">Cliente:</span>
          <span class="detalle-valor">${escapeHtml(pedido.cliente)}</span>
          
          <span class="detalle-label">Dirección:</span>
          <span class="detalle-valor">${escapeHtml(pedido.direccion)}</span>
          
          <span class="detalle-label">Fecha de pedido:</span>
          <span class="detalle-valor">${formatearFecha(pedido.fecha_pedido)}</span>
          
          <span class="detalle-label">Fecha de entrega:</span>
          <span class="detalle-valor">${formatearFecha(pedido.fecha_entrega)}</span>
          
          <span class="detalle-label">Tipo de entrega:</span>
          <span class="detalle-valor">${escapeHtml(tipoEntregaTexto)}</span>
        </div>
        
        ${pedido.comentario ? `
        <div class="comentario-box">
          <strong>📝 Comentario:</strong><br>
          ${escapeHtml(pedido.comentario)}
        </div>
        ` : ''}
        
        <div class="total-box">
          <div style="display:flex; justify-content: space-between;">
            <span class="total-label">Subtotal:</span>
            <span>${formatearMoneda(pedido.subtotal)}</span>
          </div>
          <div style="display:flex; justify-content: space-between; margin-top: 8px;">
            <span class="total-label">Total:</span>
            <span class="total-num">${formatearMoneda(pedido.total)}</span>
          </div>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: center;">
          <a href="index.html" class="btn-volver">← Seguir comprando</a>
        </div>
      `;
      
      container.innerHTML = html;
    }
    
    document.addEventListener('DOMContentLoaded', cargarDetallePedido);
  })();
</script>
</body>
</html>
