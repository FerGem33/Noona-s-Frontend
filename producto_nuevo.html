<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#5d1927",
                    "accent-pink": "#FEBDC6",
                    "background-light": "#f8f6f6",
                    "background-dark": "#1f1316",
                },
                fontFamily: { "display": ["Plus Jakarta Sans", "sans-serif"] },
                borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
            },
        },
    }
</script>
<style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .modal-overlay { background-color: #FEBDC6; }
    .custom-select {
        appearance: none;
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%235d1927' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 0.5rem center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
    }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
    <div class="bg-white dark:bg-background-dark w-full max-w-[600px] rounded-2xl shadow-2xl overflow-hidden border border-primary/10 flex flex-col" style="max-height: 85vh;">
        <!-- Header -->
        <div class="p-6 pb-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                    <span class="material-symbols-outlined text-2xl"></span>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-primary">Agregar Nuevo Producto</h2>
                    <p class="text-slate-500 text-xs">Complete los detalles para añadir un nuevo producto.</p>
                </div>
            </div>
        </div>

        <!-- Área de imagen: vista previa y selector de archivo -->
        <div class="px-6 pb-2">
            <div class="relative w-full h-40 rounded-xl overflow-hidden border border-primary/10 bg-primary/5 flex items-center justify-center">
                <img id="preview-imagen" class="w-full h-full object-cover hidden" alt="Vista previa">
                <div id="placeholder-imagen" class="flex flex-col items-center justify-center text-primary/50">
                    <span class="material-symbols-outlined text-4xl"></span>
                    <span class="text-xs mt-1">Sin imagen</span>
                </div>
            </div>
            <input type="file" id="imagen" accept="image/jpeg,image/png,image/jpg" class="mt-2 w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-primary/10 file:text-primary hover:file:bg-primary/20">
            <p class="text-xs text-slate-400 mt-1">Formatos: JPG, PNG (máx. 5MB)</p>
        </div>

        <!-- Formulario con scroll -->
        <div class="flex-1 overflow-y-auto px-6 py-2">
            <form id="form-producto" class="space-y-4">
                <div>
                    <label class="text-primary text-sm font-semibold flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm"></span> Descripción
                    </label>
                    <input id="descripcion" class="w-full px-4 py-2 rounded-lg border border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="Ej. Tiramisú de la Casa" type="text" required>
                </div>
                <div>
                    <label class="text-primary text-sm font-semibold flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm"></span> Receta
                    </label>
                    <select id="id_receta" class="w-full px-4 py-2 rounded-lg border border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary outline-none custom-select" required>
                        <option disabled selected value="">Cargando recetas...</option>
                    </select>
                </div>
                <div>
                    <label class="text-primary text-sm font-semibold flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm"></span> Categoría
                    </label>
                    <select id="id_categoria" class="w-full px-4 py-2 rounded-lg border border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary outline-none custom-select" required>
                        <option disabled selected value="">Cargando categorías...</option>
                    </select>
                </div>
                <div>
                    <label class="text-primary text-sm font-semibold flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">payments</span> Precio Unitario
                    </label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">$</span>
                        <input id="precio_unitario" class="w-full pl-8 pr-4 py-2 rounded-lg border border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary outline-none" placeholder="0.00" step="0.01" type="number" required>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="activo" class="w-4 h-4 text-primary rounded" checked>
                    <label class="text-primary text-sm font-semibold">Activo</label>
                </div>
            </form>
        </div>
        <!-- Botones -->
        <div class="p-6 pt-2 border-t border-slate-100 flex justify-end gap-3 bg-white">
            <a href="productos.html" class="px-6 py-2 rounded-lg font-bold text-primary border border-primary/30 hover:bg-primary/5 transition-colors">Cancelar</a>
            <button type="submit" form="form-producto" class="px-8 py-2 rounded-lg font-bold bg-primary text-white hover:bg-primary/90 shadow-lg transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-lg"></span>
                Confirmar
            </button>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`
        };
    }

    // Vista previa de la imagen seleccionada
    const inputImagen = document.getElementById('imagen');
    const previewImg = document.getElementById('preview-imagen');
    const placeholderDiv = document.getElementById('placeholder-imagen');

    inputImagen.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewImg.classList.remove('hidden');
                placeholderDiv.classList.add('hidden');
            }
            reader.readAsDataURL(file);
        } else {
            previewImg.classList.add('hidden');
            placeholderDiv.classList.remove('hidden');
        }
    });

    // Cargar categorías
    async function cargarCategorias() {
        try {
            const res = await fetch(`${API_BASE}/categoria/categorias/`, { headers: getHeaders() });
            if (!res.ok) throw new Error();
            const categorias = await res.json();
            const select = document.getElementById('id_categoria');
            select.innerHTML = '<option disabled selected value="">Seleccionar categoría...</option>';
            categorias.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id_categoria;
                opt.textContent = cat.descripcion || `Categoría ${cat.id_categoria}`;
                select.appendChild(opt);
            });
        } catch (error) {
            document.getElementById('id_categoria').innerHTML = '<option disabled>Error al cargar</option>';
        }
    }

    // Cargar recetas
    async function cargarRecetas() {
        try {
            const res = await fetch(`${API_BASE}/receta/recetas/`, { headers: getHeaders() });
            if (!res.ok) throw new Error();
            const recetas = await res.json();
            const select = document.getElementById('id_receta');
            select.innerHTML = '<option disabled selected value="">Seleccionar receta...</option>';
            recetas.forEach(rec => {
                const opt = document.createElement('option');
                opt.value = rec.id_receta;
                opt.textContent = rec.descripcion || `Receta ${rec.id_receta}`;
                select.appendChild(opt);
            });
        } catch (error) {
            document.getElementById('id_receta').innerHTML = '<option disabled>Error al cargar</option>';
        }
    }

    // Crear producto
    async function crearProducto(datos) {
        const res = await fetch(`${API_BASE}/producto/`, {
            method: 'POST',
            headers: {
                'accept': 'application/json',
                'Authorization': `Bearer ${TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datos)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(JSON.stringify(err.detail || err));
        }
        return res.json();
    }

    // Subir imagen del producto
    async function subirImagenProducto(idProducto, archivoImagen) {
        const formData = new FormData();
        formData.append('imagen', archivoImagen);
        const res = await fetch(`${API_BASE}/producto/${idProducto}/imagen`, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${TOKEN}`
            },
            body: formData
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || 'Error al subir la imagen');
        }
        return res.json();
    }

    // Manejar envío del formulario
    document.getElementById('form-producto').addEventListener('submit', async (e) => {
        e.preventDefault();
        const descripcion = document.getElementById('descripcion').value.trim();
        const id_categoria = parseInt(document.getElementById('id_categoria').value);
        const id_receta = parseInt(document.getElementById('id_receta').value);
        const precio_unitario = parseFloat(document.getElementById('precio_unitario').value);
        const activo = document.getElementById('activo').checked;

        if (!descripcion) { alert('La descripción es obligatoria'); return; }
        if (!id_categoria) { alert('Seleccione una categoría'); return; }
        if (!id_receta) { alert('Seleccione una receta'); return; }
        if (isNaN(precio_unitario) || precio_unitario <= 0) { alert('Precio válido requerido'); return; }

        const datosProducto = { id_categoria, id_receta, descripcion, precio_unitario, imagen: "", activo };

        try {
            // Paso 1: Crear el producto
            const nuevoProducto = await crearProducto(datosProducto);
            // Paso 2: Si hay imagen seleccionada, subirla
            if (inputImagen.files.length > 0) {
                await subirImagenProducto(nuevoProducto.id_producto, inputImagen.files[0]);
                alert('Producto e imagen creados correctamente');
            } else {
                alert('Producto creado correctamente (sin imagen)');
            }
            // Paso 3: Redirigir al listado
            window.location.href = 'productos.html';
        } catch (error) {
            alert('Error: ' + error.message);
        }
    });

    cargarCategorias();
    cargarRecetas();
</script>
</body>
</html>
