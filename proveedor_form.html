<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Registro de Nuevo Proveedor - Nonna DB</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&amp;family=Playfair+Display:wght@700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: "#5D1927",
                    "background-light": "#FEBDC6",
                    "background-dark": "#1a0b0d",
                    "card-dark": "#2d1a1d",
                },
                fontFamily: {
                    display: ["Playfair Display", "serif"],
                    sans: ["Montserrat", "sans-serif"],
                },
                borderRadius: {
                    DEFAULT: "12px",
                },
            },
        },
    };
</script>
<style>
    .material-symbols-rounded {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
        transition: background-color 0.3s ease;
    }
</style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-sans flex flex-col items-center justify-center p-4">
<button class="fixed top-6 right-6 p-2 rounded-full bg-white/50 dark:bg-white/10 backdrop-blur-md border border-white/20 hover:bg-white/80 dark:hover:bg-white/20 transition-all text-primary dark:text-pink-200" onclick="document.documentElement.classList.toggle('dark')">
    <span class="material-symbols-rounded block dark:hidden">dark_mode</span>
    <span class="material-symbols-rounded hidden dark:block">light_mode</span>
</button>
<div class="w-full max-w-lg">
    <div class="text-center mb-8">
        <h1 class="font-display text-4xl text-primary dark:text-pink-100 italic tracking-tight">Nonna</h1>
        <p class="text-primary/70 dark:text-pink-200/60 uppercase text-xs tracking-[0.2em] mt-1 font-semibold">Administración de Proveedores</p>
    </div>
    <div class="bg-white dark:bg-card-dark rounded-3xl shadow-2xl shadow-primary/10 dark:shadow-black/40 overflow-hidden border border-white dark:border-white/5">
        <div class="p-8 sm:p-10">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 rounded-full bg-background-light dark:bg-primary/30 flex items-center justify-center">
                    <span class="material-symbols-rounded text-primary dark:text-pink-200">person_add</span>
                </div>
                <h2 id="form-titulo" class="text-2xl font-bold text-gray-800 dark:text-pink-50 uppercase tracking-wide">Registrar Nuevo Proveedor</h2>
            </div>
            <form id="form-proveedor" class="space-y-6">
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-600 dark:text-pink-200/80 ml-1 uppercase tracking-wider" for="descripcion">Descripción / Nombre</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-rounded">storefront</span>
                        </div>
                        <input id="descripcion" class="block w-full pl-12 pr-4 py-3 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-gray-800 dark:text-pink-50" placeholder="Ej: Distribuidora Central S.A." type="text" required>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-600 dark:text-pink-200/80 ml-1 uppercase tracking-wider" for="direccion">DIRECCIÓN</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-rounded">location_on</span>
                        </div>
                        <input id="direccion" class="block w-full pl-12 pr-4 py-3 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-gray-800 dark:text-pink-50" placeholder="Dirección del proveedor" type="text">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="block text-sm font-semibold text-gray-600 dark:text-pink-200/80 ml-1 uppercase tracking-wider" for="contacto">Contacto (Teléfono)</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-rounded">call</span>
                        </div>
                        <input id="contacto" class="block w-full pl-12 pr-4 py-3 bg-gray-50 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-gray-800 dark:text-pink-50 [appearance:textfield]" placeholder="Sólo números" type="text">
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-4 pt-6">
                    <button type="submit" class="flex-1 bg-primary text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
                        <span class="material-symbols-rounded text-[20px] transition-transform group-hover:translate-x-1">save</span>
                        Guardar Proveedor
                    </button>
                    <a href="proveedores.html" class="flex-1 border-2 border-primary text-primary dark:text-pink-200 dark:border-primary/50 font-bold py-4 rounded-xl hover:bg-primary/5 dark:hover:bg-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-rounded text-[20px]">close</span>
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURACIÓN ====================
    const API_BASE = 'http://3.15.13.161:8000/api';
    const TOKEN = localStorage.token;

    function getHeaders() {
        return {
            'accept': 'application/json',
            'Authorization': `Bearer ${TOKEN}`,
            'Content-Type': 'application/json'
        };
    }

    // Obtener ID de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const proveedorId = urlParams.get('id');

    // ==================== API  ====================
    async function crearProveedor(datos) {
        const res = await fetch(`${API_BASE}/proveedor/`, {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify(datos)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(JSON.stringify(err.detail || err));
        }
        return res.json();
    }

    async function actualizarProveedor(id, datos) {
        const res = await fetch(`${API_BASE}/proveedor/${id}`, {
            method: 'PUT',
            headers: getHeaders(),
            body: JSON.stringify(datos)
        });
        if (!res.ok) {
            const err = await res.json();
            throw new Error(JSON.stringify(err.detail || err));
        }
        return res.json();
    }

    async function obtenerProveedor(id) {
        const res = await fetch(`${API_BASE}/proveedor/${id}`, { headers: getHeaders() });
        if (!res.ok) throw new Error(`Error ${res.status}`);
        return res.json();
    }

    // ==================== CARGAR DATOS SI ES EDICIÓN ====================
    async function cargarDatosEdicion() {
        if (!proveedorId) return;
        try {
            const proveedor = await obtenerProveedor(proveedorId);
            document.getElementById('descripcion').value = proveedor.descripcion || '';
            document.getElementById('direccion').value = proveedor.direccion || '';
            document.getElementById('contacto').value = proveedor.contacto || '';
            document.getElementById('form-titulo').innerText = 'Editar Proveedor';
        } catch (error) {
            alert('Error al cargar los datos: ' + error.message);
            window.location.href = 'proveedores.html';
        }
    }

    // ==================== GUARDAR (CREAR o ACTUALIZAR) ====================
    const form = document.getElementById('form-proveedor');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const datos = {
            descripcion: document.getElementById('descripcion').value.trim(),
            direccion: document.getElementById('direccion').value.trim(),
            contacto: document.getElementById('contacto').value.trim()
        };
        if (!datos.descripcion) {
            alert('La descripción (nombre) es obligatoria');
            return;
        }
        try {
            if (proveedorId) {
                await actualizarProveedor(proveedorId, datos);
                alert('Proveedor actualizado correctamente');
            } else {
                await crearProveedor(datos);
                alert('Proveedor creado correctamente');
            }
            window.location.href = 'proveedores.html';
        } catch (error) {
            alert('Error al guardar: ' + error.message);
        }
    });

    // Inicializar
    cargarDatosEdicion();
</script>
</body>
</html>
